data:
  # Litdata paths: [img_dir, condition_dir, caption_dir]
  data_dir:
    - data2/RemoteSAM270k/LitData_hyper_images2
    - data2/RemoteSAM270k/LitData_image_conditions
    - data2/RemoteSAM270k/LitData_image_captions
  image_size: 512
  caption_proportion:
    prompt: 1
  external_caption_suffixes: []
  external_clipscore_suffixes: []
  clip_thr_temperature: 0.1
  clip_thr: 25.0
  load_text_feat: false
  load_vae_feat: false
  transform: default_train
  type: SanaLitdataGenerativeControlDataset
  sort_dataset: false
# model config
model:
  model: SanaMSControlNet_600M_P1_D28
  image_size: 512
  mixed_precision: bf16
  fp32_attention: false  # true
  # load_from: hf://Efficient-Large-Model/Sana_600M_1024px/checkpoint/Sana_600M_1024px.pth
  load_from: src/stage2/generative/Sana/output/20260102_003537_Sana_RS_tokenizer_ControlNet/checkpoints/latest.pth #src/stage2/generative/Sana/output/20251217_215228_Sana_RS_tokenizer_ControlNet/checkpoints/latest.pth
  resume_from:
  aspect_ratio_type: ASPECT_RATIO_1024
  multi_scale: false
  attn_type: flash # linear
  ffn_type: mlp #glumbconv
  mlp_acts:
    - silu
    - silu
    -
  mlp_ratio: 4 #2.5
  use_pe: true
  qk_norm: true #false
  pos_embed_type: rope_diffusers
  class_dropout_prob: 0.2
# VAE setting
vae:
  vae_type: cosmos_RS
  vae_pretrained: "runs/stage1_cosmos_nested/2025-12-21_02-01-17_cosmos_f8c16p1_litdata_one_loader_irepa-spatial-norm_noisy_latent_aug/ema/tokenizer/model.safetensors"
  vae_latent_dim: 16
  vae_downsample_rate: 8
  # vae_type: flux
  # vae_pretrained: flux
  # vae_latent_dim: 16
  # vae_downsample_rate: 8
# text encoder
text_encoder:
  text_encoder_name: gemma-2-2b-it
  y_norm: true
  y_norm_scale_factor: 0.01
  model_max_length: 300
  # CHI
  # chi_prompt:
  #   - 'Given a user prompt, generate an "Enhanced prompt" that provides detailed visual descriptions suitable for image generation. Evaluate the level of detail in the user prompt:'
  #   - "- If the prompt is simple, focus on adding specifics about colors, shapes, sizes, textures, and spatial relationships to create vivid and concrete scenes."
  #   - "- If the prompt is already detailed, refine and enhance the existing details slightly without overcomplicating."
  #   - "Here are examples of how to transform or refine prompts:"
  #   - "- User Prompt: A cat sleeping -> Enhanced: A small, fluffy white cat curled up in a round shape, sleeping peacefully on a warm sunny windowsill, surrounded by pots of blooming red flowers."
  #   - "- User Prompt: A busy city street -> Enhanced: A bustling city street scene at dusk, featuring glowing street lamps, a diverse crowd of people in colorful clothing, and a double-decker bus passing by towering glass skyscrapers."
  #   - "Please generate only the enhanced description for the prompt below and avoid including any additional commentary or evaluations:"
  #   - "User Prompt: "
  chi_prompt: []
  extra:
    # Point to the local folder that contains `config.json`, `tokenizer.json`,
    # and `model-00001-of-00002.safetensors`, etc.
    pretrained_path: /Data2/ZihanCao/Checkpoints/gemma2-2b-it
    local_files_only: true
# Sana schedule Flow
scheduler:
  predict_flow_v: true
  noise_schedule: linear_flow
  pred_sigma: false
  flow_shift: 3.0  # 4.0
  # logit-normal timestep
  weighting_scheme: logit_normal
  logit_mean: 0.0
  logit_std: 1.0
  vis_sampler: flow_euler #flow_dpm-solver
# training setting
train:
  num_workers: 6
  seed: 2025
  train_batch_size: 1
  num_epochs: 100
  gradient_accumulation_steps: 2
  grad_checkpointing: true
  gradient_clip: 0.1
  optimizer:
    betas:
      - 0.9
      - 0.999
      - 0.9999
    eps:
      - 1.0e-30
      - 1.0e-16
    lr: 0.0002
    type: CAMEWrapper
    weight_decay: 0.0
  # optimizer:
  #   betas:
  #     - 0.9
  #     - 0.95
  #   eps: 1.0e-8
  #   lr: 2.0e-4
  #   type: AdamW
  #   weight_decay: 1.0e-3
  lr_schedule: constant
  lr_schedule_args:
    num_warmup_steps: 200
  local_save_vis: true # if save log image locally
  work_dir: output/
  visualize: true
  log_interval: 20
  save_model_epochs: 2
  save_model_steps: 4000
  eval_sampling_steps: 500
  eval_metric_step: 1000
  online_metric: false
  online_metric_dir: metric_helper
controlnet:
  control_signal_type: "random"
  control_signal_types: ["hed", "segmentation", "sketch", "mlsd"]
  drop_prob: 0.1
