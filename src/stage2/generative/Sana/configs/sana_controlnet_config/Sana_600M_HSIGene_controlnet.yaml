data:
  # Litdata paths: [img_dir, condition_dir, caption_dir]
  data_dir:
    - data2/HSIGene_dataset/LitData_hyper_images/train
    - data2/HSIGene_dataset/LitData_conditions/train
    - data2/HSIGene_dataset/LitData_image_captions/train
  image_size: 512
  caption_proportion:
    prompt: 1
  external_caption_suffixes: []
  external_clipscore_suffixes: []
  clip_thr_temperature: 0.1
  clip_thr: 25.0
  load_text_feat: false
  load_vae_feat: false
  transform: default_train
  type: SanaLitdataGenerativeControlDataset
  sort_dataset: false
# model config
model:
  model: SanaMSControlNet_600M_P1_D28
  image_size: 512
  mixed_precision: bf16
  fp32_attention: false
  # Change this path if you want to start from another checkpoint.
  load_from: src/stage2/generative/Sana/output_HSI/20260216_221238_Sana_RS_tokenizer_ControlNet/checkpoints/latest.pth
  resume_from:
  aspect_ratio_type: ASPECT_RATIO_512
  multi_scale: false
  attn_type: flash
  ffn_type: mlp
  mlp_acts:
    - silu
    - silu
    -
  mlp_ratio: 4
  use_pe: true
  qk_norm: true
  pos_embed_type: rope_diffusers
  class_dropout_prob: 0.2
# VAE setting
vae:
  vae_type: cosmos_RS_lora
  vae_pretrained: "runs/stage1_cosmos_nested/2025-12-21_02-01-17_cosmos_f8c16p1_litdata_one_loader_irepa-spatial-norm_noisy_latent_aug/ema/tokenizer/model.safetensors"
  vae_latent_dim: 16
  vae_downsample_rate: 8
  img_type: hsi
  input_shape: 48 # hyperspectral 48 bands if not set, use rgb (3 bands)
  extra:
    lora_path: "runs/stage1_cosmos_nested_lora/2026-02-20_19-00-12_cosmos_lora=lora_r=32_f8c16p1_hsigene/peft_ckpt/hsigene"
    scale_shift_type: null
    scaling_factor: 1.11718
    shift_factor: -0.2539
# text encoder
text_encoder:
  text_encoder_name: gemma-2-2b-it
  y_norm: true
  y_norm_scale_factor: 0.01
  model_max_length: 300
  chi_prompt: []
  extra:
    pretrained_path: /Data2/ZihanCao/Checkpoints/gemma2-2b-it
    local_files_only: true
# Sana schedule Flow
scheduler:
  predict_flow_v: true
  noise_schedule: linear_flow
  pred_sigma: false
  flow_shift: 3.0
  weighting_scheme: logit_normal
  logit_mean: 0.0
  logit_std: 1.0
  vis_sampler: flow_euler
# training setting
train:
  num_workers: 1
  seed: 2025
  train_batch_size: 4
  num_epochs: 100
  gradient_accumulation_steps: 2
  grad_checkpointing: true
  gradient_clip: 1.0
  optimizer:
    betas:
      - 0.9
      - 0.999
      - 0.9999
    eps:
      - 1.0e-30
      - 1.0e-16
    lr: 0.0002
    type: CAMEWrapper
    weight_decay: 0.0
  lr_schedule: constant
  lr_schedule_args:
    num_warmup_steps: 200
  local_save_vis: true
  work_dir: output_HSI/
  visualize: true
  log_interval: 20
  save_model_epochs: 2
  save_model_steps: 4000
  vis_rgb_channels: [20, 12, 4]
  eval_sampling_steps: 1000
  eval_metric_step: 1000
  online_metric: false
  online_metric_dir: metric_helper
controlnet:
  control_signal_type: "random"
  control_signal_types: ["hed", "segmentation", "sketch", "mlsd"]
  drop_prob: 0.1
