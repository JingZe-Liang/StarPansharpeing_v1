_target_: src.stage2.layers.wrapper.tokenizer_wrapper.DownstreamModelTokenizerWrapper

tokenizer:
  _target_: src.stage1.cosmos.cosmos_tokenizer.ContinuousImageTokenizer.create_model
  model:
    attn_resolutions: [32]
    channels: 128
    in_channels: 512
    out_channels: 512
    channels_mult: [2, 4, 4]
    spatial_compression: 8
    dropout: 0.0
    num_res_blocks: 2
    resolution: 1024
    z_channels: 256
    latent_channels: 16
    act_checkpoint: false
    norm_type: rmsnorm2d
    act_type: silu
    block_name: res_block
    use_residual_factor: false
    patch_method: haar
    patch_size: 1
    attn_type: none
    padding_mode: reflect
    adaptive_mode: interp
  uni_path: runs/stage1_cosmos_nested/2025-12-21_02-01-17_cosmos_f8c16p1_litdata_one_loader_irepa-spatial-norm_noisy_latent_aug/ema/tokenizer/model.safetensors
  loading_type: pretrained
  qunatizer_type: null
  hook_for_repa: false
  use_repa_loss: false
  use_vf_loss: false
  vf_on_z_or_module: z
  z_factor: 1

# Pansharpening model configuration (from nafnet.yaml)
downstream_model:
  _target_: src.stage2.utilities.amotized.amotized_model_wrapper.AmotizedModelMixin
  _partial_: true # for decode_fn

  # Model configuration
  amotize_type: "latent_to_pixel_fusion"
  backward_decoder: false
  learn_decoder: false

  # Amotized model (Transformer branch)
  amotized_model:
    _target_: src.stage2.pansharpening.models.transformer.Transformer.create_model
    in_dim: 16
    dim: 384
    depth: 8
    num_heads: 12
    mlp_ratio: 4.0
    drop: 0.0
    drop_path: 0.2
    patch_size: 1
    out_channels: 256
    norm_layer: "rmsnormfp32"
    mlp_norm_layer: "rmsnormfp32"
    act_layer: "silu"
    pos_embed_type: "sincos"
    input_size: 8 # 64 / 8 = 8
    with_raw_img: false
    raw_img_size: null
    raw_img_chans: null
    feature_layer_ids: null

  # Pixel model (NAFNet branch)
  pixel_model:
    _target_: src.stage2.pansharpening.models.naf.PansharpeningNAFNet.create_model
    pan_channel: 1
    ms_channel: ${dataset.consts.bands}
    width: 128
    middle_blk_num: 2
    enc_blk_nums: [1, 2, 2]
    dec_blk_nums: [1, 2, 2]
    enc_blk_type: ["naf", "naf", "nat"]
    dec_blk_type: ["nat", "naf", "naf"]
    condition_channel: 256 # comes from the de-tokenizer
    patch_size: 1
    dw_expand: 2
    ffn_expand: 2
    block_drop: 0.0
    condition_on_decoder: true
    residual_type: ms
    is_neg_1_1: false
    output_rescale: false
    # nat 1, 3 < nat 2
    nat_enc_kwargs:
      # - { "k_size": 8, "stride": 2, "dilation": 2 }
      - null
      - { "k_size": 4, "stride": 2, "dilation": 2 }
      - { "k_size": 4, "stride": 1, "dilation": 2 } # 64 / 4 = 16
    nat_mid_kwargs: { "k_size": 4, "stride": 1, "dilation": 2 }
    nat_dec_kwargs:
      - { "k_size": 4, "stride": 1, "dilation": 2 }
      - { "k_size": 4, "stride": 2, "dilation": 2 }
      # - { "k_size": 8, "stride": 2, "dilation": 2 }
      - null

# Wrapper configuration
froze_tokenizer: true
n_img_encoded: 3 # For pansharpening, we have 3 images: LRMS, PAN, and HRMS
tokenizer_scale_shift: [1.234, -0.391] # std, mean from cosmos_f8c16p1_lora.yaml
img_is_neg_1_1: false # Pansharpening use 0-1 range images
