_target_: src.stage2.utilities.amotized.amotized_model_wrapper.AmotizedModelMixin
_partial_: true # for decode_fn

# Model configuration
amotize_type: "latent_to_pixel_fusion"
backward_decoder: false
learn_decoder: false

# Amotized model (Transformer branch)
amotized_model:
  _target_: src.stage2.pansharpening.models.transformer.Transformer
  cfg:
    _target_: src.stage2.pansharpening.models.transformer.TransformerConfig
    in_dim: 16
    dim: 384
    depth: 8
    num_heads: 8
    mlp_ratio: 4.0
    drop: 0.0
    drop_path: 0.0
    patch_size: 2
    out_channels: 16
    norm_layer: "rmsnorm"
    mlp_norm_layer: "rmsnorm"
    act_layer: "silu"
    pos_embed_type: "sincos"
    input_size: 32
    with_raw_img: false
    raw_img_size: null
    raw_img_chans: null
    feature_layer_ids: null

# Pixel model (NAFNet branch)
pixel_model:
  _target_: src.stage2.pansharpening.models.naf.PansharpeningNAFNet
  cfg:
    _target_: src.stage2.pansharpening.models.naf.PansharpeningNAFNetConfig
    pan_channel: 1
    ms_channel: ${dataset.consts.bands}
    width: 64
    middle_blk_num: 1
    enc_blk_nums: [1, 1, 1]
    dec_blk_nums: [1, 1, 1]
    condition_channel: 16
    patch_size: 2
    use_residual: true
    dw_expand: 1
    ffn_expand: 2
    condition_on_decoder: false
    is_neg_1_1: true
    output_rescale: true
