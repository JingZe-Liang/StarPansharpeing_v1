_target_: src.stage2.utilities.amotized.amotized_model_wrapper.AmotizedModelMixin
_partial_: true # for decode_fn

# Model configuration
amotize_type: "latent_to_pixel_fusion"
backward_decoder: false
learn_decoder: false

# Amotized model (Transformer branch)
amotized_model:
  _target_: src.stage2.pansharpening.models.transformer.Transformer
  cfg:
    _target_: src.stage2.pansharpening.models.transformer.TransformerConfig
    in_dim: 16
    dim: 384
    depth: 8
    num_heads: 8
    mlp_ratio: 4.0
    drop: 0.0
    drop_path: 0.0
    patch_size: 2
    out_channels: 16
    norm_layer: "rmsnorm"
    mlp_norm_layer: "rmsnorm"
    act_layer: "silu"
    pos_embed_type: "sincos"
    input_size: 32
    with_raw_img: false
    raw_img_size: null
    raw_img_chans: null
    feature_layer_ids: null

# Pixel model (Vitamin branch)
pixel_model:
  _target_: src.stage2.pansharpening.models.vitamin_conv.VitaminModel
  cfg:
    _target_: src.stage2.pansharpening.models.vitamin_conv.VitaminCfg
    pan_channel: 1
    ms_channel: ${dataset.consts.bands}
    stem_width: 64
    embed_dim: [64, 128, 256]
    depths: [2, 2, 2]
    condition_channel: 16
    patch_size: 2
    use_residual: true
    output_rescale: true
    is_neg_1_1: true

    # Conv configuration
    conv_cfg:
      _target_: src.stage2.pansharpening.models.vitamin_conv.ConvCfg
      expand_ratio: 4.0
      expand_output: true
      kernel_size: 3
      group_size: 1
      pre_norm_act: false
      stride_mode: "dw"
      pool_type: "avg2"
      downsample_pool_type: "avg2"
      act_layer: "gelu"
      norm_layer: "layernorm2d"
      norm_eps: 1e-5
      down_shortcut: true
      mlp: "mlp"
