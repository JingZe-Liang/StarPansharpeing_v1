_target_: src.stage1.cosmos.lora_mixin.TokenizerLoRAMixin
tokenizer:
  _target_: src.stage1.cosmos.cosmos_tokenizer.ContinuousImageTokenizer.create_model
  model:
    attn_resolutions: [32]
    channels: 128
    channels_mult: [2, 4, 4]
    dropout: 0.0
    in_channels: ${list:[3, 4, 8, 10, 12, 13, 32, 50, 150, 175, 202, 224, 242, 368, 369]}
    spatial_compression: 8
    num_res_blocks: 2
    out_channels: ${list:[3, 4, 8, 10, 12, 13, 32, 50, 150, 175, 202, 224, 242, 368, 369]}
    resolution: 1024
    z_channels: 16
    act_checkpoint: false
    latent_channels: 16
    norm_type: gn
    norm_groups: 32
    block_name: res_block
    moe_token_mixer_type: res_block
    hidden_factor: 4
    use_residual_factor: false
    # others
    patch_method: haar
    patch_size: 1
    attn_type: none
    padding_mode: reflect # for boundary?
    # wrap_fsdp_last_layer: false
  # repa
  use_repa_loss: false
  use_vf_loss: false
  hook_module: decoder.decoder.mid.block_2
  vf_on_z_or_module: z # [z, module]
  dino_feature_dim: 1024
  # loading
  enc_path: ""
  dec_path: ""
  uni_path: "runs/stage1_cosmos/2025-09-13_17-16-19_cosmos_f8c16p1_unified_hyperspectral_latent_noise=0.0_channel_drop=False/ema/tokenizer/model.safetensors"
  loading_type: pretrained
  # quant
  norm_in_quant_conv: false
lora_weights:
  CD:
lora_hyper_chans:
  CD: 224
active_lora: ${dataset.cfgs.used}
tokenizer_scale_shift:
  - 6.25221633 # std
  - 0. # mean
