cfgs:
  used: WV3
  batch_size_train: 32
  batch_size_val: 4
  num_workers: 1
  prefetch_factor: 2
  train_name: ${dataset.cfgs.used}_train
  val_name: ${dataset.cfgs.used}_val
  val_full_name: ${dataset.cfgs.used}_val_full
  train_drop_last: true
  val_drop_last: true

dataset_paths:
  WV3_train: data/WorldView3/pansharpening_reduced/Pansharping_WV3_train.npz.tar
  WV3_val: data/WorldView3/pansharpening_reduced/Pansharping_WV3_val.npz.tar
  WV3_val_full: data/WorldView3/pansharpening_full/Pansharpening_FullResolution_WV3_val.npz.tar

  WV2_train: data/WorldView2/pansharpening_reduced/Pansharpening_WV2_train.npz.tar
  WV2_val: data/WorldView2/pansharpening_reduced/Pansharpening_WV2_val.npz.tar
  WV2_val_full: data/WorldView2/pansharpening_full/Pansharpening_FullResolution_WV2_val.npz.tar

  WV4_train: data/WorldView4/pansharpening_reduced/Pansharpening_WV4_train.npz.tar
  WV4_val: data/WorldView4/pansharpening_reduced/Pansharpening_WV4_val.npz.tar
  WV4_val_full: data/WorldView4/pansharpening_full/Pansharpening_FullResolution_WV4_val.npz.tar

  QB_train: data/QuickBird/pansharpening_reduced/Pansharpening_QB_train.npz.tar
  QB_val: data/QuickBird/pansharpening_reduced/Pansharpening_QB_val.npz.tar
  QB_val_full: data/QuickBird/pansharpening_full/Pansharpening_FullResolution_IKONOS_val.npz.tar

  IKONOS_train: data/IKONOS/pansharpening_reduced/Pansharpening_IKONOS_train.npz.tar
  IKONOS_val: data/IKONOS/pansharpening_reduced/Pansharpening_IKONOS_val.npz.tar
  IKONOS_val_full: data/IKONOS/pansharpening_full/Pansharpening_FullResolution_IKONOS_val.npz.tar

dataset_names_to_rgb_channels:
  WV3: [5, 3, 2]
  WV2: [5, 3, 2]
  WV4: [5, 3, 2]
  IKONOS: [2, 1, 0]

  MMSeg_YREB: [4, 3, 2]
  DCF_2019: [5, 3, 2]
  DCF_2020: [9, 6, 3]
  GID_GF2: [3, 2, 1]
  DryadHyper: [90, 60, 40]
  Houston: [40, 20, 10]
  DFC_2020: [9, 6, 4]
  MUSLI: [66, 38, 16]
  GF1: [2, 1, 0]
  OHS: [18, 11, 6]
  QB: [2, 1, 0]

consts:
  MMSeg_YREB: 12
  WV3: 8
  WV2: 8
  WV: 4
  IKONOS: 4
  QB: 4

  bands: ${dataset.consts.${dataset.cfgs.used}}
  rgb_channels: ${dataset.dataset_names_to_rgb_channels.${dataset.cfgs.used}}

train:
  _target_: src.stage2.pansharpening.data.pansharpening_loader.get_pansharp_wds_dataloader
  wds_paths: ${dataset.dataset_paths.${dataset.cfgs.train_name}}
  batch_size: ${dataset.cfgs.batch_size_train}
  num_workers: ${dataset.cfgs.num_workers}
  shuffle_size: 100
  to_neg_1_1: true
  resample: true
  prefetch_factor: ${dataset.cfgs.prefetch_factor}
  add_satellite_name: true
  drop_last: ${dataset.cfgs.train_drop_last}

val:
  _target_: src.stage2.pansharpening.data.pansharpening_loader.get_pansharp_wds_dataloader
  wds_paths: ${dataset.dataset_paths.${dataset.cfgs.val_name}}
  batch_size: ${dataset.cfgs.batch_size_val}
  num_workers: 1
  resample: false
  shuffle_size: 10
  to_neg_1_1: true
  prefetch_factor: ${dataset.cfgs.prefetch_factor}
  add_satellite_name: true
  drop_last: ${dataset.cfgs.val_drop_last}

val_full:
  _target_: src.stage2.pansharpening.data.pansharpening_loader.get_pansharp_wds_dataloader
  wds_paths: ${dataset.dataset_paths.${dataset.cfgs.val_full_name}}
  batch_size: 1
  to_neg_1_1: true
  resample: false
  num_workers: 1
  shuffle_size: 10
  add_satellite_name: true
  drop_last: ${dataset.cfgs.val_drop_last}
