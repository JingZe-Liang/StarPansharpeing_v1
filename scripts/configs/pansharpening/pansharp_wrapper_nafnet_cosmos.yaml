hydra:
  output_subdir: null
  run:
    dir: .

defaults:
  # wrapper ==========
  - dataset: pansharpening_data
  - accelerator: base
  - pansharp_model: pansharp_wrapper_nafnet_cosmos
  # self ===============
  - _self_

  # hydra overrides ====
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

dataset:
  cfgs:
    used: QB
    batch_size_train: 16

ema:
  _target_: ema_pytorch.EMA
  _partial_: true
  beta: 0.999
  update_after_step: 1000
  update_every: 2
  allow_different_devices: true

train:
  # Wrapper-based training
  val_slide_window: true
  grad_check: false

  use_single_img_indexing: false
  patches_per_image:
  macro_batch_size: 32

  proj_dir: runs/stage2_pansharpening_wrapper/
  finetune_strategy: finetune_all
  max_grad_norm: 0.03

  track_metrics_duration: -1
  track_metrics_after: 2000
  visualize_every: 200
  max_steps: 400_000
  save_every: 500

  resume_path:
  ema_load_path:

  pansharpening_loss:
    _target_: src.stage2.pansharpening.loss.amotized.AmotizedPixelLoss
    pixel_loss_type: l1ssim
    amotized_loss:
      _target_: torch.nn.MSELoss
    pixel_loss_kwargs:
      weighted_r: [1.0, 0.1] # l1ssim weights
    factors: [0.1, 1.0] # latent and pixel weights

  pansharp_optim:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 4.0e-4
    weight_decay: 1.0e-3
    eps: 1.0e-8
    foreach: true

  pansharp_sched:
    _target_: transformers.optimization.get_cosine_schedule_with_warmup
    _partial_: true
    num_warmup_steps: 100
    num_training_steps: ${train.max_steps}
    num_cycles: 1

  log:
    run_comment: f8c16p1_${dataset.cfgs.used}_nafnet_wrapper
    log_with_time: True
    log_every: 10

  debug: true

  # Preserve the to_neg_1_1 configuration as requested
  to_neg_1_1: true
  pansp_ratio: 4
  online_tokenize: true

val:
  val_duration: 1000
  max_val_reduced_iters: -1 # val only `max_val_iters` batches
  max_val_full_iters: 20
