# Configuration for WorldView3 condition tokenization
# This config file is specifically for processing WorldView3 condition images

# Constants
consts:
  run_device: 0 # GPU device ID
  tokenizer_checkpoint_path: "runs/pretrained_model_ckpts/cosmos_tokenizer_checkpoint.pth" # Update this path

# Data configuration
data:
  wids_paths:
    conditions: "data/WorldView3/conditions/shardindex.json"
  batch_size: 16 # Adjust based on your GPU memory
  num_workers: 2

# Tokenizer configuration - Update this according to your cosmos tokenizer
tokenizer:
  _target_: src.stage1.cosmos.model.Cosmos1
  # Example parameters - adjust according to your tokenizer
  in_channels: 3
  out_channels: 3
  n_embed: 1024
  n_layers: 12
  # Add more parameters as needed

# Processor configuration
processor:
  condition_keys: ["hed", "mlsd", "segmentation", "sketch"] # Specify the condition types you want to tokenize
  latent_save_backend: "safetensors" # Use safetensors for better performance

# Output configuration
output:
  output_dir: "data/WorldView3/condition_latents" # Output directory for tokenized latents
  # The script will automatically create condition_latents/ subfolder structure
