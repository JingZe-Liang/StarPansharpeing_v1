hydra:
  output_subdir: null
  run:
    dir: .

defaults:
  - dataset: cuhk_cr1
  - accelerator: base
  - vae: cosmos_rs
  - model: image_condition_unet_latent16
  - _self_

  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

accelerator:
  mixed_precision: bf16

vae:
  shift_factor: null
  scaling_factor: null

ema:
  _target_: ema_pytorch.EMA
  _partial_: true
  beta: 0.995
  update_after_step: 0
  update_every: 2
  use_foreach: true
  allow_different_devices: true
  move_ema_to_online_device: true
  lazy_init_ema: true

train:
  proj_dir: runs/stage2_cloud_removal/
  max_steps: 300_000
  save_every: 500
  visualize_every: 500
  max_grad_norm: 0.3
  compile_model: false
  train_mode: diffusion

  resume_path:
  ema_load_path:

  condition_source: auto

  # Pixel-space supervision (decode latent with frozen VAE; gradients flow to cloud-removal model only)
  pixel_loss_weight: 0.0

  # High-frequency loss weights (to preserve details)
  grad_loss_weight: 0.0 # Gradient (Sobel edge) loss weight
  fft_loss_weight: 0.0 # FFT high-frequency loss weight (optional, can try 0.05)
  fft_high_freq_ratio: 0.3 # Ratio of high-freq components in FFT (0.3 = top 30%)

  # visualization (RGB)
  is_neg_1_1: true
  visualize_rgb_channels: [0, 1, 2]

  # I2SB Transport settings
  transport_backend: i2sb
  i2sb_x1_source: cloud
  i2sb:
    n_timestep: 1000
    linear_start: 1.0e-4
    # linear_end: 2.0e-2
    beta_max: 0.3
    model_pred: x0
    ot_ode: false

  cloud_removal_optim:
    _target_: src.utilities.optim.MuonFSDP.create_muon_optimizer
    _partial_: true
    betas: [0.9, 0.95]
    mu: 0.95
    oned_param_algo: lion
    use_triton: true
    use_preconditioned: true  # turbo-muon style preconditioning
    muon_params_defaults:
      lr: 3.0e-4
      weight_decay: 0.0
      weight_update_method: hyperball
    oned_params_defaults:
      lr: 3.0e-4
      weight_decay: 0.0

  cloud_removal_sched:
    _target_: transformers.optimization.get_cosine_schedule_with_warmup
    _partial_: true
    num_warmup_steps: 0
    num_training_steps: ${train.max_steps}
    num_cycles: 1

  log:
    run_comment: fast_i2sb_unet_cuhk_cr1
    log_every: 20
    log_with_time: true

  debug: true

val:
  val_duration: 500
  max_val_iters: 20
  metrics_interp_to: 256 # baseline uses 256 px

sampler:
  type: ddpm
  num_steps: 25
  progress: false
  clip_for_x1_pred: false
