cfgs:
  used: cuhk_cr2

batch_size_train: 8
batch_size_val: 8
num_workers: 8

train_loader:
  _target_: src.stage2.cloud_removal.data.CUHK_CR.CUHK_CR_StreamingDataset.create_dataloader
  input_dir: data/Downstreams/CUHK-CR/litdata_out
  loader_kwargs:
    batch_size: ${dataset.batch_size_train}
    num_workers: ${dataset.num_workers}
    pin_memory: true
  stream_ds_kwargs:
    name: cr2
    split: train
    shuffle: false
    to_neg_1_1: true
    interp_to: null

val_loader:
  _target_: src.stage2.cloud_removal.data.CUHK_CR.CUHK_CR_StreamingDataset.create_dataloader
  input_dir: data/Downstreams/CUHK-CR/litdata_out
  loader_kwargs:
    batch_size: ${dataset.batch_size_val}
    num_workers: ${dataset.num_workers}
    pin_memory: true
  stream_ds_kwargs:
    name: cr2
    split: test
    shuffle: false
    to_neg_1_1: true
    interp_to: null
