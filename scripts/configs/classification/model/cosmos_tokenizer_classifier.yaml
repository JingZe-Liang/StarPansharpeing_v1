_target_: src.stage2.classification.model.CosmosTokenizerClassifier
num_classes: ${dataset.consts.num_classes}
tokenizer_pretrained_path: ${train.tokenizer_pretrained_path}
freeze_tokenizer: ${train.freeze_tokenizer}
use_quantizer: ${train.use_quantizer}
latent_proj_dim: ${train.latent_proj_dim}

classifier:
  classifier_type: default
  pool_type: avg
  drop_rate: 0.0
  use_conv: false
  input_fmt: NCHW

# ContinuousImageTokenizer config (minimal)
tokenizer_cfg:
  model:
    in_channels: ${dataset.consts.channels}
    out_channels: ${dataset.consts.channels}
    resolution: ${dataset.consts.img_size}
    channels: 128
    channels_mult: [2, 4, 4]
    num_res_blocks: 2
    z_channels: 256
    latent_channels: 16
    spatial_compression: 8
    patch_size: 1
    patch_method: haar
    attn_type: none
    norm_type: gn
    norm_groups: 32
    act_checkpoint: false
    padding_mode: reflect
  quantizer_type: null
  random_quant: 0.0
  norm_in_quant_conv: false
  use_latent_mask: false
  use_channel_drop: false
  name: ContinuousImageTokenizer
  decoder_type: default
  z_factor: 1
  uni_path: ""
  loading_type: null
