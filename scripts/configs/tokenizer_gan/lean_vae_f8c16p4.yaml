hydra:
  output_subdir: null
  run:
    dir: .

defaults:
  # tokenizer ==========
  - dataset: hyperspectral
  - tokenizer: lean_vae_f8c16p4
  - quantizer: quant
  - accelerator: base
  - vq_loss: remote_clip_RN50
  # self ============
  - _self_

  # hydra overrides ====
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

dataset:
  used: MMSeg_YREB
  dataset_names_to_bs:
    MMSeg_YREB: 64
    DCF_2019: 12
  transform_prob: 0.5

accelerator:
  gradient_accumulation_plugin:
    num_steps: 2

vq_loss:
  disc_network_type: patchgan_v2 # [patchgan, patchgan_v2, stylegan]
  disc_ndf: 128
  use_actnorm: false
  disc_norm_type: gn # gn or bn? works with patchgan_v2
  disc_start_for_g: 0
  disc_start_for_d: 0
  disc_loss: hinge
  ssim_weight: 0.2
  disc_weight: 0.2
  reconstruction_loss_type: dwt

ema:
  beta: 0.995
  update_after_step: 1000
  update_every: 2

train:
  tokenizer_name: lean_vae
  proj_dir: runs/stage1_lean_vae/
  finetune_strategy: finetune_all
  max_grad_norm: 0.03
  track_metrics_duration: -1
  track_metrics_after: 2000
  visualize_every: 200
  max_steps: 150_000
  save_every: 500
  seperate_enc_dec: false
  resume_path:
  ema_load_path:
  only_load_tokenizer: false
  save_peft_ckpts: false
  grad_check: false

  finetune_cfg:
    refine_decoder_head_n_layers: all
    adapt_latent_n_layers: 0

  tokenizer_optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 6.0e-4
    eps: 1.0e-8
    betas: [0.8, 0.95]
    foreach: true

  disc_optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 6.0e-4
    eps: 1.0e-8
    betas: [0.5, 0.95]
    foreach: true

  tokenizer_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 1000
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 1.0e-5

  disc_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 1000
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 1.0e-5

  log:
    run_comment: pretrained_${train.tokenizer_name}_f8c16p4
    log_with_time: True
    visualize_every: 200
    log_every: 10

  debug: true

val:
  val_duration: 1000
  max_val_iters: 10 # val only `max_val_iters` batches
