hydra:
  output_subdir: null
  run:
    dir: .

defaults:
  # tokenizer ==========
  - dataset: hyperspectral
  - tokenizer: cosmos_pretrained_f8c16p4 # change c after
  - quantizer: quant
  - accelerator: base
  - vq_loss: remote_clip_RN50
  # self ============
  - _self_

  # hydra overrides ====
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

dataset:
  used: DCF_2019
  dataset_names_to_bs:
    MMSeg_YREB: 22
    DCF_2019: 16

tokenizer:
  config:
    latent_channels: 32 # c=32
    z_channels: 32
    act_checkpoint: true
    dropout: 0.1

vq_loss:
  perceptual_type: remote_clip_RN50
  perceptual_groups_to_select: 0.5
  perceptual_weight: 0.1

ema:
  beta: 0.995
  update_after_step: 1000
  update_every: 2

train:
  tokenizer_name: cosmos_sep
  proj_dir: runs/stage1_cosmos/
  finetune_strategy: finetune_all
  max_grad_norm: 0.03
  track_metrics_duration: -1
  track_metrics_after: 2000
  visualize_every: 200
  max_steps: 200_000
  save_every: 500
  seperate_enc_dec: true
  resume_path:
  ema_load_path:
  finetune_cfg:
    refine_decoder_head_n_layers: 2
    adapt_latent_n_layers: 2

  tokenizer_optimizer:
    _target_: src.utilities.optim.mars.MARS
    _partial_: true
    lr: 2.0e-4
    weight_decay: 1.0e-6
    eps: 1.0e-8
    betas: [0.9, 0.95]

  disc_optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 1.0e-4
    eps: 1.0e-8
    foreach: true
    betas: [0.9, 0.95]

  tokenizer_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 1000
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 2.0e-5

  disc_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 1000
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 2.0e-5

  log:
    run_comment: cosmos_tokenizer_f8c32p1
    log_with_time: True
    visualize_every: 200
    log_every: 10

  debug: false

val:
  val_duration: 1000
  max_val_iters: 4 # val only `max_val_iters` batches
