enc_path: "/Data4/cao/ZiHanCao/exps/Cosmos/checkpoints/Cosmos-0.1-Tokenizer-CI8x8/encoder.jit"
dec_path: "/Data4/cao/ZiHanCao/exps/Cosmos/checkpoints/Cosmos-0.1-Tokenizer-CI8x8/decoder.jit"
config:
  model:
    attn_resolutions: [32]
    channels: 128
    channels_mult: [2, 4, 4]
    dropout: 0.0
    in_channels: ${dataset.channels}
    spatial_compression: 8
    num_res_blocks: 2
    out_channels: ${dataset.channels}
    resolution: 1024
    patch_size: 4
    patch_method: haar
    latent_channels: 16
    z_channels: 16
    z_factor: 1
    name: CI
    act_checkpoint: false

    norm_type: gn
    norm_groups: 32
    block_name: res_block
    moe_token_mixer_type: res_block
    hidden_factor: 4
    use_residual_factor: false

    attn_type: none
    padding_mode: reflect # for boundary?

  # wrap_fsdp_last_layer: true
  # formulation: AE
  # encoder: Default
  # decoder: Default

  # repa
  use_repa_loss: true
  use_vf_loss: false
  hook_module: decoder.decoder.mid.block_2
  vf_on_z_or_module: z # [z, module]
  dino_feature_dim: 1024
