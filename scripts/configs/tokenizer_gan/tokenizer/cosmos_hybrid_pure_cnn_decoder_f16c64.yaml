_target_: src.stage1.cosmos.cosmos_hybrid.CosmosHybridTokenizer.create_model

# CNN encoder x8
# Transformer encoder x2
# Downsample total x16

# F16C64 VAE tokenizer
# Parameters: 500M base model

cnn_cfg:
  model:
    resolution: 1024
    in_channels: 512 # nested channels !!
    out_channels: 512 # nested channels !!
    z_channels: 512
    latent_channels: 64
    channels: 128
    channels_mult: [2, 4, 4]
    num_res_blocks: 2
    attn_resolutions: []
    dropout: 0.0
    spatial_compression: 8
    patch_size: 1
    block_name: res_block
    norm_type: gn
    norm_groups: 32
    adaptive_mode: interp
    downsample_kwargs:
      padconv_use_manually_pad: false
    upsample_kwargs:
      interp_type: nearest_interp
    per_layer_noise: false
  quantizer_type: null
  vf_on_z_or_module: z
  use_repa_loss: true
  dino_feature_dim: 1024
  cache_type: h
  decoder_type: default # [default, generative]

## Override the decoder: directly upsample 16x
cnn_dec_cfg:
  resolution: 1024
  in_channels: 512 # nested channels !!
  out_channels: 512 # nested channels !!
  z_channels: 512
  latent_channels: 64
  channels: 128
  channels_mult: [2, 2, 4, 4]
  num_res_blocks: 3
  attn_resolutions: []
  dropout: 0.1
  spatial_compression: 16
  patch_size: 1
  block_name: res_block
  norm_type: gn
  norm_groups: 32
  adaptive_mode: interp
  downsample_kwargs:
    padconv_use_manually_pad: false
  upsample_kwargs:
    interp_type: nearest_interp
  per_layer_noise: false

trans_enc_cfg:
  embed_dim: 1152
  depth: 24
  num_heads: 16
  mlp_ratio: 4.0
  qkv_bias: true
  patch_size: 2
  norm_layer: layernorm
  pos_embed: learned
  pos_embed_grid_size: [32, 32]
  rope_type: axial
  img_size: 32
  in_chans: 512
  out_chans: 512
  unpatch_size: 1
  reg_tokens: 2
  compile_model: false

