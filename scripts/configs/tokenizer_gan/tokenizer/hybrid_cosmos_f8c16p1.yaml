_target_: src.stage1.cosmos.cosmos_hybrid.CosmosHybridTokenizer.create_model

# CNN Configuration
cnn_cfg:
  # Model configuration (EncoderDecoderConfig)
  model:
    attn_resolutions: [32]
    channels: 128
    channels_mult: [2, 4, 4]
    dropout: 0.0
    in_channels: ${dataset.channels}
    spatial_compression: 8
    num_res_blocks: 2
    out_channels: ${dataset.channels}
    resolution: 1024
    z_channels: 512 # Increased to match transformer
    act_checkpoint: true
    latent_channels: 512 # Match z_channels
    norm_type: gn
    norm_groups: 32
    block_name: res_block
    moe_token_mixer_type: res_block
    hidden_factor: 4
    use_residual_factor: false
    # others
    patch_method: haar
    patch_size: 1
    attn_type: none
    padding_mode: reflect # for boundary?

  # REPA (Representation Alignment) configuration
  use_repa_loss: true
  use_vf_loss: false
  hook_module: decoder.decoder.mid.block_2
  vf_on_z_or_module: z # [z, module]
  dino_feature_dim: 1024

  # Loading configuration
  enc_path: ""
  dec_path: ""
  uni_path: ""
  loading_type: null

  # Quantization configuration
  norm_in_quant_conv: false
  quantizer_type: null # No quantizer for basic test

# Transformer Encoder Configuration 1 (NaFlexVit)
trans_enc_cfg1:
  embed_dim: 512
  depth: 8
  num_heads: 8
  mlp_ratio: 4.0
  qkv_bias: true
  patch_size: 1 # Force to be 1 as per NaFlexVit
  norm_layer: flarmsnorm # Use Flash RMSNorm for compatibility
  pos_embed: learned # Use learned position embeddings
  pos_embed_grid_size: ${tuple:[64, 64]} # Grid size for position embedding
  # EVA-specific parameters
  attn_type: eva # Attention type: 'standard', 'eva', 'rope'
  swiglu_mlp: true # Use SwiGLU MLP variant
  qkv_fused: true # Whether to use fused QKV projections
  # Regularization
  drop_rate: 0.0
  pos_drop_rate: 0.0
  proj_drop_rate: 0.0
  drop_path_rate: 0.0
  # Architecture choices
  pre_norm: true
  final_norm: true

# Transformer Encoder Configuration 2 (NaFlexVitCfgAdpoted)
trans_enc_cfg2:
  img_size: 64 # Expected by NaFlexVitCfgAdpoted, max size 512 // 8 = 64
  z_dim: 512 # Should match z_channels from transformer
  out_chans: 512 # Output channels
  out_2d_latent: true # Output 2D latent
  unpatch_size: null # if None, use patch_size

# Optional Transformer Decoder Configuration (leave null for encoder-only)
trans_dec_cfg1: null
trans_dec_cfg2: null
