_target_: src.stage1.cosmos.cosmos_hybrid.CosmosHybridTokenizer.create_model

# CNN encoder x8
# ViT encoder patchify x2 (patch_size=2, unpatch_size=1)
# CNN decoder x16

# Dual-latent tokenizer:
# - Quantized branch (BSQ): 64 channels
# - Continuous branch: 32 channels

cnn_cfg:
  model:
    resolution: 1024
    in_channels: 512
    out_channels: 512
    z_channels: 768
    latent_channels: 64
    channels: 128
    channels_mult: [2, 4, 4]
    num_res_blocks: 2
    attn_resolutions: []
    dropout: 0.0
    spatial_compression: 8
    patch_size: 1
    block_name: res_block
    norm_type: trmsnorm2d #gn
    act_type: silu
    adaptive_mode: interp
    downsample_kwargs:
      padconv_use_manually_pad: false
    upsample_kwargs:
      interp_type: nearest_interp
    per_layer_noise: false
  quantizer_type: bsq
  random_quant: 0.5
  random_quant_per_sample: true
  bsq_flip_prob: 0.1
  dual_latent_branch: true
  continuous_latent_channels: 32
  vf_on_z_or_module: z
  use_repa_loss: true
  dino_feature_dim: 1024
  decoder_type: default # [default, generative]

trans_enc_cfg:
  embed_dim: 1152
  depth: 24
  num_heads: 16
  mlp_ratio: 4.0
  qkv_bias: true
  patch_size: 2
  norm_layer: flarmsnorm
  pos_embed: learned
  pos_embed_grid_size: [32, 32]
  rope_type: axial
  img_size: 32
  in_chans: 768
  out_chans: 768
  unpatch_size: 1
  reg_tokens: 4
  compile_model: false
  attn_type: gated

distillation_cfg:
  dino_feature_dim: 1024
  semantic_feature_dim: 1024 # 1024 for vit large; 1152 for vit naflex
  cache_layers:
    low_level: [0, 1, 2, -1]
    semantic: [5, 11, 17, 23]

hybrid_tokenizer_cfg:
  latent_bottleneck_type: before_semantic
  latent_straight_through_skip: true

# Override decoder CNN config separately:
# - decoder: x16 decompression
cnn_dec_cfg:
  resolution: 1024
  in_channels: 512
  out_channels: 512
  z_channels: 768
  latent_channels: 64
  channels: 128
  channels_mult: [1, 2, 4, 4]
  num_res_blocks: 2
  attn_resolutions: []
  dropout: 0.0
  spatial_compression: 16
  patch_size: 1
  block_name: res_block
  norm_type: trmsnorm2d
  act_type: silu
  adaptive_mode: interp
  downsample_kwargs:
    padconv_use_manually_pad: false
  upsample_kwargs:
    interp_type: nearest_interp
  per_layer_noise: false
