dataset:
  train_loader:
    macro_sampled_batch_size:
      128: 20
      256: 14
      512: 6

  weights:
    [30, 25, 15, 10, 10, 10, 15, 10, 5, 15, 15, 15, 16, 10, 16, 10, 11, 20]

vq_loss:
  # l2 latent regularization loss
  latent_reg_weight: null
  sigreg_weight: 1.0e-5
  sigreg_options:
    knots: 17
    rnd_proj_dim: 64
  latent_reg_type: l2
  # perceptual loss
  perceptual_weight: 0.1
  # repa loss
  repa_loss_weight: 0.1
  repa_loss_options:
    c_dim_first: true
    build_proj: false
    rgb_channels: mean
    img_resize: 512 # null for no resize
    repa_img_size: 512
    # repa_model_type: dinov3
    # repa_model_name: "dinov3_vitl16"
    repa_model_type: pe
    repa_model_name: "PE-Spatial-L14-448"
    repa_model_load_path: "/Data/ZiHanCao/checkpoints/perception_models/PE-Spatial-L14-448.pt"
    feature_resample_type: match_teacher
    loss_type: hier_distillation
    feature_normalize: spatial
    get_hier_teacher_feature: true
  # semantic distillatin loss
  sem_distill_weight: 0.1
  sem_distill_options:
    c_dim_first: true
    build_proj: false
    rgb_channels: mean
    img_resize: 512 # null for no resize
    repa_img_size: 512
    repa_model_type: siglip2
    repa_model_name: "google/siglip2-large-patch16-512"
    feature_resample_type: match_teacher
    loss_type: hier_distillation
    feature_normalize: spatial
    get_hier_teacher_feature: true
  # vf loss
  vf_loss_weight:
  vf_loss_options:
    c_dim_first: true
    build_proj: false
    rgb_channels: mean #${dataset.rgb_channels}
    img_resize: 384
    repa_img_size: 384
    distmat_margin: 0.25
    cos_margin: 0.5
    repa_model_name: "dinov3_vitl16"
  # gram loss
  gram_loss_weight:
  gram_loss_options:
    c_dim_first: true
    build_proj: false
    rgb_channels: mean
    img_resize: 384 # null for no resize
    repa_img_size: 384
    repa_model_name: "dinov3_vitl16"
  # quantizer loss
  quantizer_type:
  quantizer_options:
  # discriminator loss
  disc_network_type: patchgan # [patchgan, patchgan_v2, stylegan, r3gan]
  disc_in_channels: 512 #${dataset.channels} ## interp conv
  disc_ndf: 128
  disc_num_layers: 3
  use_actnorm: false
  disc_norm_type: bn2d # gn or bn? works with patchgan_v2; bn does not support the r1, r2 loss
  disc_start_for_g: 0
  disc_start_for_d: 0
  disc_loss: relative
  ssim_weight: 0.0
  disc_weight: 0.4
  reconstruction_loss_type: mse
  # r1, r2 loss seems not necessary
  # disc_reg_gamma: 1
  # disc_reg_type: r1r2
  # disc_reg_freq: 2
  lcr_loss_weight: 0.0
  lcr_loss_options:
    thresh: 0.75
    windows_size: [2, 2]

ema:
  _target_: ema_pytorch.EMA
  _partial_: true
  beta: 0.995
  update_after_step: 0
  update_every: 1
  use_foreach: true
  allow_different_devices: true
  # update_model_with_ema_every: 5_000

train:
  tokenizer_name: hybrid_cosmos_f8c32_ijepa
  proj_dir: runs/stage1_cosmos_mingtok
  finetune_strategy: finetune_all # [finetune_all, decoder_only, peft]
  max_grad_norm: 0.3
  track_metrics: true
  track_metrics_duration: -1
  track_metrics_after: 2000
  visualize_every: 200
  max_steps: 1_000_000
  save_every: 1000
  grad_checkpoint: false # model activation checkpoint
  resume_path:
  ema_load_path: runs/stage1_cosmos_mingtok/2026-01-14_05-31-08_mingtok_RS_tokenizer_f8c16p1/ema
  compile_model: false
  only_load_tokenizer: false
  seperate_enc_dec: false
  grad_check: false # check per-step gradients
  proxy_task_train_type: seperated

  # profile
  time_recorder_enable: false
  time_recorder_duration: 20

  # augmentations
  aug_pipeline_train_obj: #decoder_deg
  aug_pipeline:
    # _target_: src.stage2.denoise.utils.noise_adder.get_tokenizer_trainer_noise_adder
    # p: 0.1
    # use_torch: true

  finetune_cfg:
    refine_decoder_head_n_layers: all
    adapt_latent_n_layers: 0

  tokenizer_optimizer:
    _target_: src.utilities.optim.MuonFSDP.create_muon_optimizer
    _partial_: true
    betas: [0.9, 0.95]
    mu: 0.95
    oned_param_algo: lion
    use_triton: true
    use_preconditioned: true # turbo-muon style preconditioning
    muon_params_defaults:
      lr: 4.0e-4
      weight_decay: 0.01
    oned_params_defaults:
      lr: 3.0e-4
    weight_decay: 0.0

    # _target_: torch.optim.AdamW
    # _partial_: true
    # lr: 4.0e-4
    # weight_decay: 1.0e-5
    # eps: 1.0e-8
    # betas: [0.9, 0.95]
    # foreach: true

    # _target_: heavyball.AdamW
    # _partial_: true
    # lr: 6.0e-4
    # weight_decay: 0.01
    # caution: true
    # betas: ${tuple:[0.9,0.95]} # big model, small beta2 for stability

    # _target_: bitsandbytes.optim.AdamW8bit
    # _partial_: true
    # lr: 3.0e-4
    # weight_decay: 0.01
    # min_8bit_size: 15999
    # betas: ${tuple:[0.95,0.99]}
    # is_paged: false

    # _target_: adam_mini.Adam_mini
    # _partial_: true
    # lr: 3.0e-4
    # weight_decay: 0.01
    # betas: ${tuple:[0.95,0.99]}
    # n_heads: 16
    # n_kv_heads: 16

  disc_optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 3.0e-4
    weight_decay: 1.0e-5
    eps: 1.0e-8
    betas: [0.5, 0.9] #[0.9, 0.95]
    foreach: true

  tokenizer_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 0
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 1.0e-5
    # _target_: transformers.optimization.get_constant_schedule_with_warmup
    # _partial_: true
    # num_warmup_steps: 1000

  disc_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 0
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 1.0e-5
    # _target_: transformers.optimization.get_constant_schedule_with_warmup
    # _partial_: true
    # num_warmup_steps: 1000

  log:
    run_comment: mingtok_RS_tokenizer_f8c16p1
    log_with_time: true
    visualize_every: 500
    log_every: 10
    log_with: ["tensorboard", "swanlab"]

  debug: true

model_sampling: {}

val:
  val_duration: 1000
  max_val_iters: 200 # val only `max_val_iters` batches
