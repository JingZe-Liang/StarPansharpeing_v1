defaults:
  # tokenizer ==========
  - dataset: litdata_one_loader # [hyperspectral, unified_hyperspectral]
  - tokenizer: cosmos_hybrid_one_big_transformer_dual_bsq64_cont32
  - quantizer: quant
  - proxy_task: ijepa
  - accelerator: base
  - vq_loss: remote_clip_RN50
  # self ============
  - _self_

  # hydra overrides ====
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

hydra:
  run:
    dir: runs/stage1_cosmos_hybrid_dual_latent/${now:%Y-%m-%d_%H-%M-%S}_${train.log.run_comment}
  output_subdir: hydra_config

accelerator:
  gradient_accumulation_plugin:
    _target_: accelerate.utils.GradientAccumulationPlugin
    num_steps: 1

proxy_task:
  task: ["ijepa"]
  loss_weights:
    ijepa: 1.0
  ijepa:
    model:
      embed_dim: ${tokenizer.trans_enc_cfg.embed_dim}
    optimizer:
      _target_: torch.optim.AdamW
      _partial_: true
      lr: 3.0e-4
      weight_decay: 1.0e-5
      eps: 1.0e-8
      betas: [0.95, 0.99]
      foreach: true
    scheduler:
      _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
      _partial_: true
      num_warmup_steps: 500
      num_training_steps: ${train.max_steps}
      num_cycles: 1
      reduced_factor: 2
      min_lr: 1.0e-5

tokenizer:
  cnn_cfg:
    # Build repa/semantic distill + dual latent branches
    use_repa_loss: true
    use_vf_loss: false
    quantizer_type: bsq
    dual_latent_branch: true
    continuous_latent_channels: 32
    random_quant_per_sample: true
    random_quant: 0.5
    model:
      latent_channels: 64
  trans_enc_cfg:
    pretrained_type: ["ijepa"]
  distillation_cfg:
    semantic_feature_dim: 1024
    cache_layers:
      low_level: [0, 1, 2, -1]
      semantic: [5, 11, 17, 23]

vq_loss:
  disc_in_channels: 512
  # reconstruction only (plus Phi-S + IJEPA proxy loss)
  perceptual_weight: 0.0
  reconstruction_loss_type: mse
  reconstruction_weight: 1.0
  ssim_weight: 0.0

  # distill: dino + siglip (no Phi-S)
  repa_loss_weight: 0.1
  repa_loss_options:
    c_dim_first: true
    build_proj: false
    rgb_channels: mean
    img_resize: 512
    repa_img_size: 512
    repa_model_type: dinov3
    repa_model_name: "dinov3_vitl16"
    feature_resample_type: match_teacher
    loss_type: hier_distillation
    feature_normalize: spatial
    get_hier_teacher_feature: true
  sem_distill_weight: 0.1
  sem_distill_options:
    c_dim_first: true
    build_proj: false
    rgb_channels: mean
    img_resize: 512
    repa_img_size: 512
    repa_model_type: siglip2
    repa_model_name: "google/siglip2-large-patch16-512"
    feature_resample_type: match_teacher
    loss_type: hier_distillation
    feature_normalize: spatial
    get_hier_teacher_feature: true
  vf_loss_weight:
  gram_loss_weight:

  # disable Phi-S
  phis_loss_weight:

  # disable GAN
  disc_network_type: none
  disc_weight: 0.0
  disc_start_for_g: 0
  disc_start_for_d: 0
  disc_loss: relative

  # BSQ quantizer loss
  quantizer_type: bsq
  quantizer_options:
    quantizer_loss_weight: 1.0
    codebook_enlarge_steps: 0
    codebook_enlarge_ratio: 0.0

  # extra losses off
  lecam_loss_weight:
  lcr_loss_weight:

ema:
  _target_: ema_pytorch.EMA
  _partial_: true
  beta: 0.999
  update_after_step: 0
  update_every: 2
  use_foreach: true
  allow_different_devices: true

train:
  tokenizer_name: hybrid_cosmos_dual_bsq64_cont32_distill_ijepa
  proj_dir: null
  finetune_strategy: finetune_all
  max_grad_norm: 0.08
  grad_checkpoint: true
  track_metrics: true
  track_metrics_duration: -1
  track_metrics_after: 1000
  visualize_every: 200
  max_steps: 1_000_000
  save_every: 1000
  resume_path:
  ema_load_path:
  compile_model: false
  only_load_tokenizer: false
  seperate_enc_dec: false
  grad_check: false
  proxy_task_train_type: unified

  # augmentations
  aug_pipeline_train_obj:
  aug_pipeline:

  finetune_cfg:
    refine_decoder_head_n_layers: all
    adapt_latent_n_layers: 0

  tokenizer_optimizer:
    _target_: src.utilities.optim.MuonFSDP.create_muon_optimizer
    _partial_: true
    betas: [0.9, 0.95]
    mu: 0.95
    oned_param_algo: lion
    use_triton: true
    use_preconditioned: true
    muon_params_defaults:
      lr: 4.0e-4
      weight_decay: 0.02
    oned_params_defaults:
      lr: 4.0e-4
      weight_decay: 0.02

  disc_optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 3.0e-4
    weight_decay: 1.0e-5
    eps: 1.0e-8
    betas: [0.5, 0.9]
    foreach: true

  tokenizer_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 1000
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 1.0e-5

  # Not used when discriminator is disabled, kept for config compatibility.
  disc_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 1000
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 1.0e-5

  log:
    run_comment: dual_bsq64_cont32_distill_ijepa_${dataset.used}
    log_with: ['tensorboard']
    log_with_time: True
    visualize_every: 500
    log_every: 10

  debug: true

val:
  val_duration: 1000
  max_val_iters: 200
