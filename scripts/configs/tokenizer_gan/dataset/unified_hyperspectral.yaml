train_changed_kwargs_by_loader:
  ## use act_ckpt
  - batch_size: 16 # BigEarthNet_S2
    permute: false
  - batch_size: 12 # TUM_128
    num_workers: 0
  - batch_size: 5 # MDAS-HySpex
    num_workers: 0
  - batch_size: 5 # MDAS-EeteS
    num_workers: 0
  - batch_size: 16 # MMSeg_YREB
    num_workers: 0
  - batch_size: 16 # DFC_2020
    num_workers: 0
  - batch_size: 16 # WorldView3, WorldView2
    num_workers: 0
  - batch_size: 16 # QuickBird, WorldView4, IKONOS
    num_workers: 0
  - batch_size: 5 # OHS
  - batch_size: 5 # Houston
    num_workers: 0
  - batch_size: 5 # DCF_2019
    num_workers: 0
  - batch_size: 5 # MDAS-Optical
    num_workers: 0
  - batch_size: 4 # DryadHyper
    num_workers: 0
  - batch_size: 5 # RS5M-512 pixel
    img_key: [img_content]
    tgt_key: [img]
    constraint_size: 65536
    resize_before_transform: 512
  - batch_size: 2 # miniFrance and other
    resize_before_transform: 720
    img_key: auto
  - batch_size: 16 # HyperGlobal EO1
  - batch_size: 16 # HyperGlobal GF5
  - batch_size: 8 # hyspecnet11k
  - batch_size: 4 # MMOT
    resize_before_transform: 512
    img_key: [npy]
    tgt_key: [img]
    keys_to_remove: [txt]
  - batch_size: 5 # conditions
    resize_before_transform: 512
    img_key: [mlsd, sketch, hed, segmentation]
    keys_to_remove: [rgb.png]
  - batch_size: 12 # neon
    img_key: [hsi]
    tgt_key: [img]
    keys_to_remove: [rgb.jpg, metadata.jsonl]
  - batch_size: 5
    resize_before_transform: 512
    img_key: [img]
    keys_to_remove: [metadata.jsonl]

val_changed_kwargs_by_loader:
  - batch_size: 6
