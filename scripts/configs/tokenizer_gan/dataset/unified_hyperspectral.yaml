train_changed_kwargs_by_loader:
  - batch_size: 5
  - batch_size: 22
  - batch_size: 18
  - batch_size: 5
  - batch_size: 5
  - batch_size: 5
  - batch_size: 5
  - batch_size: 16
  - batch_size: 3
  - batch_size: 22
  - batch_size: 22
  - batch_size: 22
  - batch_size: 22
  - batch_size: 5

val_changed_kwargs_by_loader:
  - batch_size: 8
  - batch_size: 8
  - batch_size: 8
  - batch_size: 8
  - batch_size: 8
  - batch_size: 8
  - batch_size: 8
  - batch_size: 8
  - batch_size: 8

train_loader:
  _target_: src.data.hyperspectral_loader.get_hyperspectral_img_loaders_with_different_backends
  loader_type: webdataset
  paths: ${dataset.train_paths}
  basic_kwargs:
    shuffle_size: 100
    num_workers: 3
    prefetch_factor: 6
    shuffle_within_workers: false
  changed_kwargs_by_loader: ${dataset.train_changed_kwargs_by_loader}

val_loader:
  _target_: src.data.hyperspectral_loader.get_hyperspectral_img_loaders_with_different_backends
  loader_type: webdataset
  paths: ${dataset.val_paths}
  basic_kwargs:
    shuffle_size: -1
    num_workers: 1
    prefetch_factor: 1
    shuffle_within_workers: false
  changed_kwargs_by_loader: ${dataset.val_changed_kwargs_by_loader}
