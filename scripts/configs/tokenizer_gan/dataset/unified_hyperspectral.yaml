train_changed_kwargs_by_loader:
  ## use act_ckpt
  - batch_size: 16 # BigEarthNet_S2
    permute: false
  - batch_size: 12 # TUM_128
    num_workers: 0
  - batch_size: 5 # MDAS-HySpex
    num_workers: 0
  - batch_size: 5 # MDAS-EeteS
    num_workers: 0
  - batch_size: 16 # MMSeg_YREB
  - batch_size: 16 # DFC_2020
  - batch_size: 16 # WorldView3
  - batch_size: 16 # QuickBird
  - batch_size: 16 # WorldView2
  - batch_size: 16 # WorldView4
  - batch_size: 16 # IKONOS
  - batch_size: 5 # OHS
  - batch_size: 5 # Houston
  - batch_size: 5 # DCF_2019
  - batch_size: 5 # GID-GF2
  - batch_size: 5 # MDAS-Optical
  - batch_size: 4 # DryadHyper
    num_workers: 0
  - batch_size: 5 # RS5M-512 pixel
    img_key: img_content
    constraint_size: 65536
    resize_before_transform: 512
    num_workers: 0
  - batch_size: 2 # miniFrance and other
    num_workers: 0
    resize_before_transform: 768
  - batch_size: 16 # HyperGlobal
    num_workers: 0
  - batch_size: 8
    num_workers: 0
  - batch_size: 4
    num_workers: 0
    resize_before_transform: 512
    img_key: npy
  # - batch_size: 1 # MUSLI (512 pixel)
  #   num_workers: 0

