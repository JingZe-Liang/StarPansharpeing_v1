    num_workers: 0
  - batch_size: 5 # OHS
  - batch_size: 5 # Houston
    num_workers: 0
  - batch_size: 5 # DCF_2019
    num_workers: 0
  - batch_size: 5 # MDAS-Optical
    num_workers: 0
  - batch_size: 4 # DryadHyper
    num_workers: 0
  - batch_size: 5 # RS5M-512 pixel
    img_key: img_content
    constraint_size: 65536
    resize_before_transform: 512
  - batch_size: 2 # miniFrance and other
    resize_before_transform: 720
    img_key: auto
  - batch_size: 16 # HyperGlobal EO1
  - batch_size: 16 # HyperGlobal GF5
  - batch_size: 8 # hyspecnet11k
  - batch_size: 4 # MMOT
    resize_before_transform: 512
    img_key: npy
  # - batch_size: 1 # MUSLI (512 pixel)
  #   num_workers: 0

