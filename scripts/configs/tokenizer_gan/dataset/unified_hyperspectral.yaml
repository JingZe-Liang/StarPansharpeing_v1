    resize_before_transform: 512
  - batch_size: 4 # miniFrance
    resize_before_transform: 720
  - batch_size: 6 # hyperglobal
  - batch_size: 6 # rscaption-collection
    resize_before_transform: 512
  - batch_size: 6 # hyspecnet-11k
  - batch_size: 6 # MMOT
    resize_before_transform: 512
    img_key: npy
    tgt_key: img
  - batch_size: 6
    resize_before_transform: 64
    img_key: hsi
    keys_to_remove: [rgb.jpg, metadata.jsonl]

train_loader:
  _target_: src.data.hyperspectral_loader.get_hyperspectral_img_loaders_with_different_backends
  loader_type: webdataset
  paths: ${dataset.train_paths}
  basic_kwargs:
    shuffle_size: -1
    num_workers: 2
    resample: true
    prefetch_factor: 4
    shuffle_within_workers: true
  changed_kwargs_by_loader: ${dataset.train_changed_kwargs_by_loader}
  curriculum_type: linear
  curriculum_kwargs:
    total_steps: 500_000 #${training.max_steps}
    start_prob:
      - 0.8 # BigEarthNet_S2
      - 0.3 # TUM
      - 0.3 # MDAS-HySpex
      - 0.3 # MDAS-EeteS
      - 0.2 # MMSeg_YREB
      - 0.3 # DFC_2020
      - 0.2 # WorldView3, WorldView2
      - 0.2 # QuickBird, WorldView4, IKONOS
      - 0.3 # OHS
      - 0.1 # Houston
      - 0.3 # DCF_2019
      - 0.3 # GID-GF2
      - 0.2 # MDAS-Optical
      - 0.2 # DryadHyper
      - 2.7 # RS5M, relative large value (logits) to sample this dataset
      - 1.6 # miniFrance
      - 1.4 # HyperGlobal450k EO1
      - 1.4 # HyperGlobal450k GF5
      - 1.4 # hyspecnet11k
      - 1.6 # MMOT
      - 1.8 # conditions
      - 1.6 # neon
      - 2.0 # satellogic
      # - 0.2 # MUSLI
    end_prob:
      - 0.8
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 1.0 # relative large value (logits) to sample this dataset
      - 1.0
      - 0.6
      - 0.6
      - 1.0
      - 1.0
      - 0.6 # conditions
      - 0.6
      - 1.0
      # - 0.2

