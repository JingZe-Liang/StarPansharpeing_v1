train_loader:
  _target_: src.data.hyperspectral_loader.get_hyperspectral_img_loaders_with_different_backends
  loader_type: webdataset
  paths: ${dataset.train_paths}
  basic_kwargs:
    shuffle_size: -1
    num_workers: 2
    resample: true
    prefetch_factor: 4
    shuffle_within_workers: true
  changed_kwargs_by_loader: ${dataset.train_changed_kwargs_by_loader}
  curriculum_type: linear
  curriculum_kwargs:
    total_steps: 500_000 #${training.max_steps}
    start_prob:
      - 0.8 # BigEarthNet_S2
      - 0.3 # TUM
      - 0.3 # MDAS-HySpex
      - 0.3 # MDAS-EeteS
      - 0.2 # MMSeg_YREB
      - 0.3 # DFC_2020
      - 0.2 # WorldView3
      - 0.2 # QuickBird
      - 0.2 # WorldView2
      - 0.2 # WorldView4
      - 0.2 # IKONOS
      - 0.3 # OHS
      - 0.1 # Houston
      - 0.3 # DCF_2019
      - 0.3 # GID-GF2
      - 0.2 # MDAS-Optical
      - 0.2 # DryadHyper
      - 2.7 # RS5M, relative large value (logits) to sample this dataset
      - 2.0 # miniFrance
      - 1.6 # HyperGlobal450k EO1
      - 1.6 # HyperGlobal450k GF5
      - 1.4 # hyspecnet11k
      - 1.8 # MMOT
      # - 0.2 # MUSLI
    end_prob:
      - 0.8
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 0.4
      - 1.0 # relative large value (logits) to sample this dataset
      - 1.0
      - 0.6
      - 0.6
      - 1.0
      - 1.0
      # - 0.2

