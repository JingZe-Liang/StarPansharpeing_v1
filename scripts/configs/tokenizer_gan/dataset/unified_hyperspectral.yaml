  - batch_size: 12 # TUM_128
    num_workers: 0
  - batch_size: 5 # MDAS-HySpex
    num_workers: 0
  - batch_size: 5 # MDAS-EeteS
    num_workers: 0
  - batch_size: 16 # MMSeg_YREB
    num_workers: 0
  - batch_size: 16 # DFC_2020
    num_workers: 0
  - batch_size: 16 # WorldView3
    num_workers: 0
  - batch_size: 16 # QuickBird
    num_workers: 0
  - batch_size: 16 # WorldView2
    num_workers: 0
  - batch_size: 16 # WorldView4
    num_workers: 0
