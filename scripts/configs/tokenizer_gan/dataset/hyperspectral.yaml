# if is lora -------------
channels: ${list:[3, 4, 8, 10, 12, 13, 32, 50, 150, 175, 202, 224, 242, 368, 369]}
# ------------------------
train_name: ${dataset.used}_train
val_name: ${dataset.used}_val
wds_path_train: ${dataset[${dataset.train_name}]}
wds_path_val: ${dataset[${dataset.val_name}]}
dataset_channel: ${dataset.dataset_names_to_n_channels[${dataset.used}]}
batch_size_train: ${dataset.dataset_names_to_bs[${dataset.used}]}
batch_size_val: 8
rgb_channels: ${dataset.dataset_names_to_rgb_channels[${dataset.used}]}
img_size: ${dataset.dataset_names_to_img_size[${dataset.used}]}
hyper_transforms_lst:
  - grayscale
  - rotation
  - cutmix
  - horizontal_flip
  - vertical_flip
transform_prob: 0.5
random_apply: [1, 2]
loader_type: webdataset
to_neg_1_1: true

# function entry
train_loader:
  _target_: src.data.hyperspectral_loader.get_hyperspectral_img_loaders_with_different_backends
  paths: ${dataset.wds_path_train}
  loader_type: ${dataset.loader_type}
  basic_kwargs:
    batch_size: ${dataset.batch_size_train}
    num_workers: ${dataset.num_workers}
    prefetch_factor: ${dataset.prefetch_factor}
    shuffle_within_workers: ${dataset.shuffle_within_workers}
    resample: true
    check_channels_n: ${dataset.dataset_channel}

val_loader:
  _target_: src.data.hyperspectral_loader.get_hyperspectral_img_loaders_with_different_backends
  paths: ${dataset.wds_path_val}
  basic_kwargs:
    batch_size: ${dataset.batch_size_val}
    num_workers: 0
    prefetch_factor: null
    shuffle_within_workers: false
    resample: true
    check_channels_n: ${dataset.dataset_channel}
