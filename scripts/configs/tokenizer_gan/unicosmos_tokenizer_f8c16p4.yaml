hydra:
  output_subdir: null
  run:
    dir: .

defaults:
  # tokenizer ==========
  - dataset: unified_hyperspectral # [hyperspectral, unified_hyperspectral]
  - tokenizer: uni_cosmos_f8c16p4
  - quantizer: quant
  - accelerator: base
  - vq_loss: remote_clip_RN50
  # self ============
  - _self_

  # hydra overrides ====
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

# accelerator:
#   gradient_accumulation_plugin:
#     _target_: accelerate.utils.GradientAccumulationPlugin
#     num_steps: 3

vq_loss:
  repa_loss_weight: 0.1
  repa_loss_options:
    c_dim_first: true
    build_proj: false
    rgb_channels: mean
    img_resize: 224 # null for no resize
    dino_img_size: 224
  vf_loss_weight:
  vf_loss_options:
    c_dim_first: true
    build_proj: false
    rgb_channels: mean #${dataset.rgb_channels}
    img_resize: 224
    dino_img_size: 224
    distmat_margin: 0.25
    cos_margin: 0.5
  quantizer_type:
  quantizer_options:
  disc_network_type: patchgan # [patchgan, patchgan_v2, stylegan, r3gan]
  disc_ndf: 128
  disc_num_layers: 3
  use_actnorm: false
  disc_norm_type: bn2d # gn or bn? works with patchgan_v2; bn does not support the r1, r2 loss
  disc_start_for_g: 0
  disc_start_for_d: 0
  disc_loss: relative
  ssim_weight: 0.04
  disc_weight: 0.1
  reconstruction_loss_type: mse
  # r1, r2 loss seems not necessary
  # disc_reg_gamma: 1
  # disc_reg_type: r1r2
  # disc_reg_freq: 2

tokenizer:
  # repa
  use_repa_loss: true
  use_vf_loss: false
  hook_module: decoder.decoder.mid.block_2
  vf_on_z_or_module: z #module

  # loading
  uni_tokenizer_path: runs/stage1_cosmos/2025-07-31_20-13-17_cosmos_f8c16p1_unified_hyperspectral_uni/ema/tokenizer/model.safetensors
  loading_type: pretrained

  # blocks
  enc_moe: false
  dec_moe: false
  norm_type: gn
  norm_groups: 32
  block_name: res_block
  moe_token_mixer_type: res_block
  hidden_factor: 4
  use_residual_factor: false

  # others
  patch_method: haar
  patch_size: 1
  attn_type: none
  padding_mode: reflect # for boundary?

  # latents
  latent_channels: 16
  z_channels: 16

  # augmentations
  latent_noise_prob: 0.2
  use_channel_drop: false

  # train
  act_checkpoint: true

  channel_drop_config:
    learnable: false
    drop_type: ${list:[4, 8, 12]}
    max_channels: 16
    drop_prob: 0.5

  ## downsample and upsample
  # downsample_type: ConvPixelUnshuffle
  # downsample_shortcut: averaging
  # upsample_type: ConvPixelShuffle
  # upsample_shortcut: duplicating

ema:
  beta: 0.999
  update_after_step: 1000
  update_every: 1

train:
  tokenizer_name: uni_cosmos_f8c${tokenizer.latent_channels}p${tokenizer.patch_size}
  proj_dir: runs/stage1_cosmos
  finetune_strategy: finetune_all # dcae_refine_decoder_head
  max_grad_norm: 0.03
  track_metrics_duration: -1
  track_metrics_after: 2000
  visualize_every: 200
  max_steps: 500_000
  save_every: 1000
  seperate_enc_dec: false
  resume_path: #runs/stage1_cosmos/2025-07-31_15-18-10_cosmos_f8c16p1_unified_hyperspectral_uni/checkpoints/checkpoint_7
  ema_load_path: #runs/stage1_cosmos/2025-07-31_20-13-17_cosmos_f8c16p1_unified_hyperspectral_uni/ema
  compile_model: false
  only_load_tokenizer: false

  # augmentations
  aug_pipeline_train_obj: decoder_deg
  aug_pipeline:
    _target_: src.stage2.denoise.utils.noise_adder.get_tokenizer_trainer_noise_adder
    p: 0.1
    use_torch: true

  finetune_cfg:
    refine_decoder_head_n_layers: all
    adapt_latent_n_layers: 0

  tokenizer_optimizer:
    _target_: src.utilities.optim.get_muon_optimizer
    _partial_: true
    lr: 2.0e-4
    weight_decay: 0.1
    adamw_eps: 1.0e-8
    ns_diff_abc: true
    ns_norm: false
    momentum: 0.9
    adamw_betas: ${tuple:[0.9, 0.95]} #[0.5, 0.9], gan training beta1 is zero
    adamw_wd: 0.

    # _target_: torch.optim.AdamW
    # _partial_: true
    # lr: 2.0e-4
    # weight_decay: 1.0e-4
    # eps: 1.0e-8
    # betas: [0.5, 0.95]
    # foreach: true

  disc_optimizer:
    _target_: src.utilities.optim.get_muon_optimizer
    _partial_: true
    lr: 2.0e-4
    weight_decay: 0.1
    adamw_eps: 1.0e-8
    ns_diff_abc: true
    ns_norm: false
    momentum: 0.9
    adamw_betas: ${tuple:[0.9, 0.95]} #[0.5, 0.9], gan training beta1 is zero
    adamw_wd: 0.

    # _target_: torch.optim.AdamW
    # _partial_: true
    # lr: 2.0e-4
    # weight_decay: 1.0e-4
    # eps: 1.0e-8
    # betas: [0.0, 0.9] #[0.9, 0.95]
    # foreach: true

  tokenizer_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 1000
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 1.0e-5
    # _target_: transformers.optimization.get_constant_schedule_with_warmup
    # _partial_: true
    # num_warmup_steps: 1000

  disc_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 1000
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 1.0e-5
    # _target_: transformers.optimization.get_constant_schedule_with_warmup
    # _partial_: true
    # num_warmup_steps: 1000

  log:
    run_comment: cosmos_f8c${tokenizer.latent_channels}p${tokenizer.patch_size}_${dataset.used}_uni
    log_with_time: True
    visualize_every: 500
    log_every: 10

  debug: true

val:
  val_duration: 1000
  max_val_iters: 200 # val only `max_val_iters` batches
