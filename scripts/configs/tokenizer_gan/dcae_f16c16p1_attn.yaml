hydra:
  output_subdir: null
  run:
    dir: .

defaults:
  - dataset: hyperspectral
  - tokenizer: sana_dcae_f16c16p1
  - quantizer: quant
  - accelerator: base
  - vq_loss: remote_clip_RN50
  - _self_

  # hydra overrides ====
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

dataset:
  dataset_names_to_bs:
    MMSeg_YREB: 20
    DCF_2019: 32

ema:
  beta: 0.995
  update_after_step: 1000
  update_every: 2

vq_loss:
  repa_loss_weight: 1.5
  quantizer_type: null
  quantizer_options:
    # quantizer_loss_weight: 0.1
    # codebook_enlarge_ratio: 3
    # codebook_enlarge_steps: 2000
  repa_loss_options:
    c_dim_first: true
    build_proj: false
    rgb_channels: random
    img_resize:
    repa_img_size: 224
  disc_network_type: patchgan # [patchgan, patchgan_v2, stylegan]
  disc_ndf: 128
  use_actnorm: false
  disc_norm_type: bn2d # gn or bn? works with patchgan_v2
  disc_start_for_g: 0
  disc_start_for_d: 0
  disc_loss: hinge
  ssim_weight: 0.2
  disc_weight: 0.8
  reconstruction_loss_type: l1

train:
  tokenizer_name: dcae
  proj_dir: runs/stage1_dcae/
  finetune_strategy: finetune_all
  max_grad_norm: 0.03
  track_metrics_duration: -1
  track_metrics_after: 2000
  visualize_every: 200
  max_steps: 400_000
  save_every: 500
  seperate_enc_dec: false
  resume_path:
  ema_load_path: runs/stage1_dcae/2025-05-03_00-30-58_dcae_f16c16_lita_repa/ema
  only_load_tokenizer: true
  grad_check: false
  finetune_cfg:
    refine_decoder_head_n_layers: 2
    adapt_latent_n_layers: 2

  tokenizer_optimizer:
    _target_: src.utilities.optim.get_muon_optimizer
    _partial_: true
    lr: 4.0e-4
    weight_decay: 0.1
    adamw_eps: 1.0e-8

  disc_optimizer:
    _target_: src.utilities.optim.get_muon_optimizer
    _partial_: true
    lr: 3.0e-4
    weight_decay: 0.1
    adamw_eps: 1.0e-8

  tokenizer_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 1000
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 2.0e-5

  disc_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 1000
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 2.0e-5

  log:
    run_comment: dcae_f16c16_lita_repa
    log_with_time: True
    visualize_every: 200
    log_every: 10

  debug: true

val:
  val_duration: 1000
  max_val_iters: 4 # val only `max_val_iters` batches
