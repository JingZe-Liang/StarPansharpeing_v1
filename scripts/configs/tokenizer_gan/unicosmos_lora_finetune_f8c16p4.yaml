hydra:
  output_subdir: null
  run:
    dir: .

defaults:
  # tokenizer ==========
  - dataset: hyperspectral
  - tokenizer: uni_cosmos_f8c16p4
  - quantizer: quant
  - accelerator: base
  - vq_loss: remote_clip_RN50
  # self ============
  - _self_

  # hydra overrides ====
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

dataset:
  used: DryadHyper
  prefetch_factor:
  num_workers: 3
  shuffle_size: 100
  loader_type: webdataset
  shuffle_within_workers: false
  dataset_names_to_bs:
    MMSeg_YREB: 24
    DCF_2019: 7
    DFC_2020: 18
    GID_GF2: 12
    Houston: 7
    DryadHyper: 16
    MUSLI: 1
    OHS: 6
    WV3: 16
    QB: 16
    GF1: 16
    IKONOS: 16

  transform_prob: 0.5

accelerator:
  gradient_accumulation_plugin:
    num_steps: 2

tokenizer:
  hook_for_repa: false
  proj_for_vf: false
  hook_module: decoder.decoder.mid.block_2
  vf_on_z_or_module: module

  act_checkpoint: false
  uni_tokenizer_path: runs/stage1_cosmos/2025-05-29_16-24-09_cosmos_f8c16p4_uni/ema/tokenizer/model.safetensors
  loading_type: pretrained
  use_channel_drop: false
  enc_moe: false
  dec_moe: false
  norm_type: gn
  norm_groups: 32
  block_name: res_block
  patch_method: haar
  hidden_factor: 4
  patch_size: 4
  attn_type: none
  padding_mode: reflect # for boundary?
  latent_channels: 16

  # channel_drop_config:
  #   learnable: false
  #   drop_type: uniform_4
  #   max_channels: 16
  #   img_size: 32
  #   drop_prob: 1.0

  ## downsample and upsample
  downsample_type: ConvPixelUnshuffle
  downsample_shortcut: averaging
  upsample_type: ConvPixelShuffle
  upsample_shortcut: duplicating

vq_loss:
  disc_network_type: patchgan # [patchgan, patchgan_v2, stylegan]
  disc_ndf: 128
  use_actnorm: false
  disc_norm_type: bn # gn or bn? works with patchgan_v2
  disc_start_for_g: 0
  disc_start_for_d: 0
  disc_loss: relative
  ssim_weight: 0.2
  disc_weight: 0.8
  repa_loss_weight: #1.5
  vf_loss_weight:
  repa_loss_options:
    c_dim_first: true
    build_proj: false
    rgb_channels: random
    img_resize:
    dino_img_size: 224
  vf_loss_options:
    c_dim_first: true
    build_proj: false
    rgb_channels: ${dataset.rgb_channels}
    img_resize: 224
    dino_img_size: 224
    distmat_margin: 0.25
    cos_margin: 0.5

ema:
  beta: 0.995
  update_after_step: 1000
  update_every: 2

peft:
  _target_: peft.LoraConfig
  peft_type: lora
  r: 16
  lora_alpha: 8
  use_dora: false
  use_rslora: false
  target_modules:
    # - conv1
    # - conv2
    # - q
    # - k
    # - v
    # - proj_out
  lora_dropout: 0
  modules_to_save:
    # - encoder.encoder.conv_in
    # - decoder.decoder.conv_out
    # - _repa_proj
    # - encoder.quant_conv
    # - decoder.quant_conv

train:
  tokenizer_name: cosmos_uni
  proj_dir: runs/stage1_cosmos_lora/
  finetune_strategy: peft
  max_grad_norm: 0.03
  track_metrics_duration: -1
  track_metrics_after: 2000
  visualize_every: 200
  max_steps: 350_000
  save_every: 500
  seperate_enc_dec: false
  resume_path:
  ema_load_path: #runs/stage1_cosmos_lora/2025-05-29_23-50-53_lora_fintune_f8c16p4_MMSeg_YREB_uni_pretrained/ema
  only_load_tokenizer: false
  save_peft_ckpts: true
  grad_check: false
  compile_model: false

  finetune_cfg:
    refine_decoder_head_n_layers: all
    adapt_latent_n_layers: 0

  tokenizer_optimizer:
    # _target_: src.utilities.optim.get_muon_optimizer
    # _partial_: true
    # lr: 2.0e-4
    # weight_decay: 0.1
    # adamw_eps: 1.0e-8
    # ns_diff_abc: true
    # ns_norm: true
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 1.0e-4
    weight_decay: 1.0e-4
    eps: 1.0e-8
    betas: [0.9, 0.95]

  disc_optimizer:
    # _target_: src.utilities.optim.get_muon_optimizer
    # _partial_: true
    # lr: 2.0e-4
    # weight_decay: 0.1
    # adamw_eps: 3.0e-8
    # ns_diff_abc: true
    # ns_norm: true
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 1.0e-4
    weight_decay: 1.0e-4
    eps: 1.0e-8
    betas: [0.0, 0.95]

  tokenizer_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 1000
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 1.0e-5
    # _target_: transformers.optimization.get_constant_schedule_with_warmup
    # _partial_: true
    # num_warmup_steps: 1000

  disc_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 1000
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 1.0e-5
    # _target_: transformers.optimization.get_constant_schedule_with_warmup
    # _partial_: true
    # num_warmup_steps: 1000

  log:
    run_comment: lora_fintune_f8c16p4_${dataset.used}_uni_pretrained-adam_opt
    log_with_time: True
    visualize_every: 200
    log_every: 10

  debug: true

val:
  val_duration: 1000
  max_val_iters: 40 # val only `max_val_iters` batches
