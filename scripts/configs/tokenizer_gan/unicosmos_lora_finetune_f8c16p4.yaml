hydra:
  output_subdir: null
  run:
    dir: .

defaults:
  # tokenizer ==========
  - dataset: hyperspectral
  - tokenizer: uni_cosmos_f8c16p4
  - quantizer: quant
  - accelerator: base
  - vq_loss: remote_clip_RN50
  # self ============
  - _self_

  # hydra overrides ====
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

dataset:
  used: WV3
  prefetch_factor: 2
  num_workers: 3
  shuffle_size: 100
  loader_type: webdataset
  shuffle_within_workers: false
  dataset_names_to_bs:
    MMSeg_YREB: 24
    DCF_2019: 7
    DFC_2020: 18
    GID_GF2: 12
    Houston: 7
    DryadHyper: 16
    MUSLI: 1
    OHS: 6
    WV3: 6
    QB: 16
    GF1: 16
    IKONOS: 16

  transform_prob: 0.5

accelerator:
  gradient_accumulation_plugin:
    num_steps: 1

tokenizer:
  # repa
  use_repa_loss: false
  use_vf_loss: false
  hook_module: decoder.decoder.mid.block_2
  vf_on_z_or_module: z

  # loading
  uni_tokenizer_path: runs/stage1_cosmos/2025-08-14_00-52-19_cosmos_f8c16p1_unified_hyperspectral_latent_noise=0.0_channel_drop=False/ema/tokenizer/model.safetensors
  loading_type: pretrained

  # blocks
  enc_moe: false
  dec_moe: false
  norm_type: gn
  norm_groups: 32
  block_name: res_block
  moe_token_mixer_type: res_block
  hidden_factor: 4
  use_residual_factor: false

  # others
  patch_method: haar
  patch_size: 1
  attn_type: none
  padding_mode: reflect

  # latents
  latent_channels: 16
  z_channels: 16

  # augmentations
  latent_noise_prob: 0.0
  use_channel_drop: false

  # train
  act_checkpoint: true

  channel_drop_config:
    drop_type: ${list:[4, 8, 12]}
    max_channels: ${tokenizer.latent_channels}
    drop_prob: 0.5

vq_loss:
  repa_loss_weight: 0.0
  repa_loss_options:
    c_dim_first: true
    build_proj: false
    rgb_channels: mean
    img_resize: 224 # null for no resize
    dino_img_size: 224
  vf_loss_weight:
  vf_loss_options:
    c_dim_first: true
    build_proj: false
    rgb_channels: mean #${dataset.rgb_channels}
    img_resize: 224
    dino_img_size: 224
    distmat_margin: 0.25
    cos_margin: 0.5
  quantizer_type:
  quantizer_options:
  disc_network_type: patchgan # [patchgan, patchgan_v2, stylegan, r3gan]
  disc_ndf: 128
  disc_num_layers: 3
  use_actnorm: false
  disc_norm_type: bn2d # gn or bn? works with patchgan_v2; bn does not support the r1, r2 loss
  disc_start_for_g: 0
  disc_start_for_d: 0
  disc_loss: relative
  ssim_weight: 0.04
  disc_weight: 0.1
  reconstruction_loss_type: mse
  # r1, r2 loss seems not necessary
  # disc_reg_gamma: 1
  # disc_reg_type: r1r2
  # disc_reg_freq: 2

ema:
  beta: 0.995
  update_after_step: 1000
  update_every: 2

peft:
  _target_: peft.LoraConfig
  peft_type: lora
  r: 16
  lora_alpha: 8
  use_dora: false
  use_rslora: false
  target_modules:
    # [placeholder, add in tokenizer class]
    # - conv1
    # - conv2
    # - q
    # - k
    # - v
    # - proj_out
  lora_dropout: 0
  modules_to_save:
    # [placeholder, add in tokenizer class]
    # - encoder.encoder.conv_in
    # - decoder.decoder.conv_out
    # - _repa_proj
    # - encoder.quant_conv
    # - decoder.quant_conv

train:
  tokenizer_name: cosmos_lora
  proj_dir: runs/stage1_cosmos_lora/
  finetune_strategy: peft
  max_grad_norm: 0.03
  track_metrics_duration: -1
  track_metrics_after: 2000
  visualize_every: 200
  max_steps: 350_000
  save_every: 500
  seperate_enc_dec: false
  resume_path:
  ema_load_path:
  only_load_tokenizer: false
  save_peft_ckpts: true
  grad_check: false
  compile_model: false

  finetune_cfg:
    refine_decoder_head_n_layers: all
    adapt_latent_n_layers: 0

  tokenizer_optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 1.0e-4
    weight_decay: 1.0e-4
    eps: 1.0e-8
    betas: [0.9, 0.995]

  disc_optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 1.0e-4
    weight_decay: 1.0e-4
    eps: 1.0e-8
    betas: [0.9, 0.995]

  tokenizer_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 1000
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 1.0e-5

  disc_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 1000
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 1.0e-5

  log:
    run_comment: cosmos_lora_ft_f8c${tokenizer.latent_channels}p${tokenizer.patch_size}_${dataset.used}
    log_with_time: true
    visualize_every: 200
    log_every: 10

  debug: true

val:
  val_duration: 1000
  max_val_iters: 200 # val only `max_val_iters` batches
