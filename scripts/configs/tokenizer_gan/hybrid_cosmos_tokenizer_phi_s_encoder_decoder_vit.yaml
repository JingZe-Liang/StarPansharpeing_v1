defaults:
  # tokenizer ==========
  - dataset: litdata_one_loader # [hyperspectral, unified_hyperspectral]
  - tokenizer: cosmos_hybrid_phi_s_encoder_decoder_vit
  - quantizer: quant
  # - proxy_task: ijepa
  - accelerator: base
  - vq_loss: remote_clip_RN50
  # self ============
  - _self_

  # hydra overrides ====
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

hydra:
  run:
    dir: runs/stage1_cosmos_hybrid_enc_dec/${now:%Y-%m-%d}/${now:%H-%M-%S}_${train.log.run_comment}
  output_subdir: hydra_config

accelerator:
  gradient_accumulation_plugin:
    _target_: accelerate.utils.GradientAccumulationPlugin
    num_steps: 1

