train:
  tokenizer_name: hybrid_cosmos_phi_s_encdec_vit_f8c${tokenizer.cnn_cfg.model.latent_channels}p${tokenizer.cnn_cfg.model.patch_size}
  proj_dir: null
  finetune_strategy: finetune_all
  max_grad_norm: 3.0
  track_metrics: false
  track_metrics_duration: -1
  track_metrics_after: 2000
  visualize_every: 200
  max_steps: 1_000_000
  save_every: 1000
  resume_path: runs/stage1_cosmos_hybrid_enc_dec/2026-03-08/17-41-05_phi_s_encdec_vit_ijepa_litdata_one_loader_diff_loss_reg/checkpoints/checkpoint_61
  ema_load_path:
  compile_model: false
  only_load_tokenizer: false
  seperate_enc_dec: false
  grad_check: false
  grad_checkpoint: true
  proxy_task_train_type: unified

  # augmentations
  aug_pipeline_train_obj:
  aug_pipeline:

  finetune_cfg:
    refine_decoder_head_n_layers: all
    adapt_latent_n_layers: 0

  tokenizer_optimizer:
    _target_: src.utilities.optim.MuonFSDP.create_muon_optimizer
    _partial_: true
    betas: [0.9, 0.95]
    mu: 0.95
    oned_param_algo: adamw
    use_triton: true
    use_preconditioned: false # turbo-muon style preconditioning
    muon_params_defaults:
      lr: 4.0e-4
      weight_decay: 0.1
    oned_params_defaults:
      lr: 2.0e-4
      weight_decay: 0.0
    # _target_: torch.optim.AdamW
    # _partial_: true
    # lr: 4.0e-4
    # weight_decay: 0
    # eps: 1.0e-8
    # betas: [0.95, 0.99]
    # foreach: true

  disc_optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 3.0e-4
    weight_decay: 1.0e-5
    eps: 1.0e-8
    betas: [0.5, 0.9] #[0.9, 0.95]
    foreach: true

  tokenizer_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 0
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 1.0e-5

  # Not used when discriminator is disabled, kept for config compatibility.
  disc_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 1000
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 1.0e-5

  log:
    run_comment: phi_s_encdec_vit_ijepa_${dataset.used}_diff_loss_reg
    log_with_time: True
    visualize_every: 500
    log_every: 10
    log_with: ['tensorboard']

  debug: false

val:
  val_duration: 1000
  max_val_iters: 200
