tokenizer:
  cnn_cfg:
    use_repa_loss: true # keep true to build Phi-S student projection heads
    use_vf_loss: false
    quantizer_type: kl
  trans_enc_cfg:
    pretrained_type: #["ijepa"]
  distillation_cfg:
    phis_student_source: semantic
    semantic_feature_dim: 1024
    teacher_proj_dims:
      dinov3:
        low_level_out_dim: 1024
        semantic_out_dim: 1024
      siglip2:
        low_level_out_dim: 1024
        semantic_out_dim: 1024
      pe:
        low_level_out_dim: 1024
        semantic_out_dim: 1024
    decoder_ul_lambda0: 5.0
    decoder_use_ul_noisy_latent: false

vq_loss:
  disc_in_channels: 512
  # reconstruction only (plus Phi-S + IJEPA proxy loss)
  perceptual_weight: 0.0
  reconstruction_loss_type: mse
  reconstruction_weight: 1.0
  ssim_weight: 0.1

  # disable repa/vf/gram/sem-distill
  repa_loss_weight:
  sem_distill_weight:
  vf_loss_weight:
  gram_loss_weight:

  # Phi-S multi-teacher distillation
  phis_start_for_g: 0
  phis_loss_weight: 0.4
  phis_loss_options:
    phi_cache_path: runs/phi_s_cache/phi_s_buffer.pt
    phi_cache_required: true
    phi_cache_broadcast: true
    phi_cache_load_on_init: true
    c_dim_first: true
    rgb_channels: mean
    img_resize: 512
    repa_img_size: 512
    feature_resample_type: match_student
    phi_loss_type: mse
    teacher_configs:
      dinov3:
        repa_model_type: dinov3
        repa_model_name: dinov3_vitl16
        dino_pretrained_on: satellite
        rgb_channels: mean
        img_resize: 512
        repa_img_size: 512
      siglip2:
        repa_model_type: siglip2
        repa_model_name: google/siglip2-large-patch16-512
        rgb_channels: mean
        img_resize: 512
        repa_img_size: 512
      pe:
        repa_model_type: pe
        repa_model_name: PE-Spatial-L14-448
        # Override this path if your checkpoint location is different.
        repa_model_load_path: /Data/ZiHanCao/checkpoints/perception_models/PE-Spatial-L14-448.pt
        rgb_channels: mean
        img_resize: 512
        repa_img_size: 512
    teacher_dims:
      dinov3: [1024, 1024, 1024, 1024]
      siglip2: [1024, 1024, 1024, 1024]
      pe: [1024, 1024, 1024, 1024]
    teacher_weights:
      dinov3: 0.34
      siglip2: 0.33
      pe: 0.33

  # diffusion prior regularization
  diffusion_start_for_g: 0
  diffusion_loss_weight: 0.0
  diffusion_loss_options:
    lambda0: 5.0
    end_logsnr: -15.0
    schedule: linear_logsnr_vp
    time_sample_type: uniform
    include_terminal_kl: false

  # disable GAN
  disc_network_type: patchgan
  disc_weight: 0.0
  disc_start_for_g: 0
  disc_start_for_d: 0
  disc_loss: relative

  # quantizer loss
  quantizer_type: kl
  quantizer_options:
    kl_weight: 1.0e-6

  # extra losses off
  lecam_loss_weight:
  lcr_loss_weight:

ema:
  _target_: ema_pytorch.EMA
  _partial_: true
  beta: 0.999
  update_after_step: 0
  update_every: 2
  use_foreach: true
  allow_different_devices: true

diffusion_reg: null
