hydra:
  output_subdir: null
  run:
    dir: .

defaults:
  # tokenizer ==========
  - dataset: hyperspectral
  - tokenizer: uni_cosmos_f8c16p4
  - quantizer: quant
  - accelerator: base
  - vq_loss: remote_clip_RN50
  # self ============
  - _self_

  # hydra overrides ====
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

dataset:
  used: DCF_2019
  dataset_names_to_bs:
    MMSeg_YREB: 22
    DCF_2019: 4
    GID_GF2: 7
    DryadHyper: 16

  transform_prob: 0.5

vq_loss:
  repa_loss_weight: 1.5
  quantizer_type:
  quantizer_options:
  repa_loss_options:
    c_dim_first: true
    build_proj: false
    rgb_channels: random
    img_resize: 224
    dino_img_size: 224
  disc_network_type: patchgan # [patchgan, patchgan_v2, stylegan]
  disc_ndf: 128
  use_actnorm: false
  disc_norm_type: bn2d # gn or bn? works with patchgan_v2
  disc_start_for_g: 0
  disc_start_for_d: 0
  disc_loss: hinge
  ssim_weight: 0.2
  disc_weight: 0.8
  reconstruction_loss_type: l1

tokenizer:
  hook_for_repa: true
  hook_module: decoder.decoder.mid.block_2
  act_checkpoint: false
  force_not_attn: true
  use_channel_drop: false
  patch_size: 2  # [2, 4]
  enc_path:
  dec_path:
  uni_tokenizer_path: runs/stage1_cosmos/cosmos_f8c16p2_Drayd_band_224/tokenizer/model.safetensors
  loading_type: pretrained
  norm_type: gn
  padding_mode: zeros

  ## downsample and upsample
  # downsample_type: Conv
  # downsample_shortcut: averaging
  # upsample_type: RepeatConv
  # upsample_shortcut: duplicating

ema:
  beta: 0.995
  update_after_step: 1000
  update_every: 2

train:
  tokenizer_name: uni_cosmos_f8c16p2
  proj_dir: runs/stage1_cosmos/
  finetune_strategy: finetune_all # dcae_refine_decoder_head
  max_grad_norm: 0.03
  track_metrics_duration: -1
  track_metrics_after: 2000
  visualize_every: 200
  max_steps: 500_000
  save_every: 1000
  seperate_enc_dec: false
  resume_path:
  ema_load_path: #runs/stage1_cosmos/2025-05-21_02-02-02_cosmos_f8c16p2_unified_hyperspectral/ema
  only_load_tokenizer: true
  compile_model: false

  finetune_cfg:
    refine_decoder_head_n_layers: all
    adapt_latent_n_layers: 0

  tokenizer_optimizer:
    _target_: src.utilities.optim.get_moun_optimizer
    _partial_: true
    lr: 4.0e-4
    weight_decay: 0.1
    adamw_eps: 1.0e-8

  disc_optimizer:
    _target_: src.utilities.optim.get_moun_optimizer
    _partial_: true
    lr: 4.0e-4
    weight_decay: 0.1
    adamw_eps: 1.0e-8

  tokenizer_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 1000
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 1.0e-5

  disc_sched:
    _target_: src.utilities.train_utils.lr_scheduler.get_cosine_schedule_reduced_with_warmup
    _partial_: true
    num_warmup_steps: 1000
    num_training_steps: ${train.max_steps}
    num_cycles: 1
    reduced_factor: 2
    min_lr: 1.0e-5

  log:
    run_comment: cosmos_f8c16p2_${dataset.used}_rmsnorm_rep_padding_mode
    log_with_time: True
    visualize_every: 200
    log_every: 10

  debug: true

val:
  val_duration: 1000
  max_val_iters: 20 # val only `max_val_iters` batches
