hydra:
  output_subdir: null
  run:
    dir: .

defaults:
  # tokenizer ==========
  - dataset: litdata_one_loader # [hyperspectral, unified_hyperspectral, litdata_one_loader]
  - tokenizer: cosmos_hybrid_one_big_transformer
  - quantizer: quant
  - proxy_task: ijepa
  - accelerator: base
  - vq_loss: remote_clip_RN50
  # self ============
  - _self_

  # hydra overrides ====
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

accelerator:
  gradient_accumulation_plugin:
    _target_: accelerate.utils.GradientAccumulationPlugin
    num_steps: 1

dataset:
  train_loader:
    macro_sampled_batch_size:
      128: 20
      256: 14
      512: 8

  weights:
    [30, 25, 15, 10, 10, 10, 15, 10, 5, 15, 15, 15, 16, 10, 16, 10, 11, 20]

# proxy_task:
#   optimizer:
#     _target_: heavyball.AdamW
#     _partial_: true
#     lr: 2.0e-4
#     weight_decay: 0.01
#     caution: true
#     mars: false
#     betas: ${tuple:[0.9,0.99]}

tokenizer:
  cnn_cfg:
    model:
      latent_channels: 64
    quantizer_type: null
    use_channel_drop: false
    channel_drop_config:
      drop_type: ${list:[16,32,48]}
      max_channels: 64
      drop_prob: 0.5
  trans_enc_cfg:
    #   in_chans: 1024
    #   out_chans: 1024
    pretrained_type: "ijepa"
  # trans_dec_cfg:
  #   in_chans: 1024
  #   out_chans: 1024

vq_loss:
  # perceptual loss
  perceptual_weight: 0.1
  # repa loss
  repa_loss_weight: 0.1
  repa_loss_options:
    c_dim_first: true
    build_proj: false
    rgb_channels: mean
    img_resize: 512 # null for no resize
    repa_img_size: 512
    # repa_model_type: dinov3
    # repa_model_name: "dinov3_vitl16"
    repa_model_type: pe
    repa_model_name: "PE-Spatial-L14-448"
    repa_model_load_path: "/Data/ZiHanCao/checkpoints/perception_models/PE-Spatial-L14-448.pt"
    feature_resample_type: match_teacher
    loss_type: hier_distillation
    feature_normalize: spatial
    get_hier_teacher_feature: true
  # semantic distillatin loss
  sem_distill_weight: 0.1
  sem_distill_options:
    c_dim_first: true
    build_proj: false
    rgb_channels: mean
    img_resize: 512 # null for no resize
    repa_img_size: 512
    repa_model_type: siglip2
    repa_model_name: "google/siglip2-large-patch16-512"
    feature_resample_type: match_teacher
    loss_type: hier_distillation
    feature_normalize: spatial
    get_hier_teacher_feature: true
  # vf loss
  vf_loss_weight:
  vf_loss_options:
    c_dim_first: true
    build_proj: false
    rgb_channels: mean #${dataset.rgb_channels}
    img_resize: 384
    repa_img_size: 384
    distmat_margin: 0.25
    cos_margin: 0.5
    repa_model_name: "dinov3_vitl16"
  # gram loss
  gram_loss_weight:
  gram_loss_options:
    c_dim_first: true
    build_proj: false
    rgb_channels: mean
    img_resize: 384 # null for no resize
    repa_img_size: 384
    repa_model_name: "dinov3_vitl16"
  # quantizer loss
  quantizer_type:
  quantizer_options:
  # discriminator loss
  disc_network_type: patchgan # [patchgan, patchgan_v2, stylegan, r3gan]
  disc_in_channels: 512 #${dataset.channels} ## interp conv
  disc_ndf: 128
  disc_num_layers: 3
  use_actnorm: false
  disc_norm_type: bn2d # gn or bn? works with patchgan_v2; bn does not support the r1, r2 loss
  disc_start_for_g: 0
  disc_start_for_d: 0
  disc_loss: relative
  ssim_weight: 0.0
  disc_weight: 0.4
  reconstruction_loss_type: mse
  # r1, r2 loss seems not necessary
  # disc_reg_gamma: 1
  # disc_reg_type: r1r2
  # disc_reg_freq: 2

ema:
  _target_: ema_pytorch.EMA
  _partial_: true
  beta: 0.9995
  update_after_step: 0
  update_every: 2
  use_foreach: true
  allow_different_devices: true
  # update_model_with_ema_every: 5_000

train:
  tokenizer_name: hybrid_cosmos_f16c64
  proj_dir: runs/stage1_cosmos_hybrid
  finetune_strategy: finetune_all # [finetune_all, decoder_only, peft]
  max_grad_norm: 1.0
  track_metrics: true
  track_metrics_duration: -1
  track_metrics_after: 2000
  visualize_every: 200
  max_steps: 1_000_000
  save_every: 1000
  grad_checkpoint: false
  resume_path: #runs/stage1_cosmos_hybrid/2025-12-06_18-33-38_hybrid_cosmos_f16c64_jepa_pretrained/checkpoints/checkpoint_45
  ema_load_path: runs/stage1_cosmos_hybrid/2025-12-16_01-15-52_hybrid_cosmos_f16c64_jepa_pretrained_gram_distillation_v1/ema
  compile_model: false
  only_load_tokenizer: false
  seperate_enc_dec: false

  # augmentations
  aug_pipeline_train_obj: #decoder_deg
  aug_pipeline:
    # _target_: src.stage2.denoise.utils.noise_adder.get_tokenizer_trainer_noise_adder
    # p: 0.1
    # use_torch: true

  finetune_cfg:
    refine_decoder_head_n_layers: all
    adapt_latent_n_layers: 0

  tokenizer_optimizer:
    # _target_: src.utilities.optim.get_muon_optimizer
    # _partial_: true
    # lr: 4.0e-4 # Reduced learning rate for hybrid model stability
    # weight_decay: 0.1
    # adamw_eps: 1.0e-8
    # ns_diff_abc: true
    # ns_norm: false
    # momentum: 0.9
    # adamw_betas: ${tuple:[0.9, 0.95]} #[0.5, 0.9], gan training beta1 is zero
    # adamw_wd: 0.

    # _target_: src.utilities.optim.get_muon_triton_optimizer
    # _partial_: true
    # general_defaults:
    #   lr: 4.0e-4
    # muon_defaults:
    #   lr: 4.0e-4
    #   weight_decay: 0.1
    #   momentum: 0.95
    # adamw_defaults:
    #   lr: 2.0e-4
    #   weight_decay: 0.0
    #   betas: [0.9, 0.95]

    # _target_: src.utilities.optim.MuonFSDP.create_muon_optimizer
    # _partial_: true
    # betas: [0.9, 0.95]
    # mu: 0.95
    # oned_param_algo: lion
    # use_triton: true
    # use_preconditioned: true # turbo-muon style preconditioning
    # muon_params_defaults:
    #   lr: 3.0e-4
