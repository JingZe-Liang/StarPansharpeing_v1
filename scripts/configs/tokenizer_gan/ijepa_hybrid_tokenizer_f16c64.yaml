  log:
    run_comment: hybrid_cosmos_f16c64_jepa_pretrained_gram_distillation_v1
    log_with_time: true
    visualize_every: 500
    log_every: 10
    log_with: ['tensorboard', 'swanlab']

  debug: true

model_sampling: {}

val:
  val_duration: 1000
  max_val_iters: 200 # val only `max_val_iters` batches
