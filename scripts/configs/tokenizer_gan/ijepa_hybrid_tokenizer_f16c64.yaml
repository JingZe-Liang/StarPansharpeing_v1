  disc_optimizer:
    # _target_: torch.optim.AdamW
    # _partial_: true
    # lr: 3.0e-4
    # weight_decay: 1.0e-5
    # eps: 1.0e-8
    # betas: [0.5, 0.9] #[0.9, 0.95]
