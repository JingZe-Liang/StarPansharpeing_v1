defaults:
  - tokenizer: hybrid
  - _self_

_target_: src.stage2.segmentation.models.tokenizer_backbone_adapted.TokenizerHybridUNet.create_model
# Tokenizer Feature Configuration
tokenizer_feature:
  pretrained_path: null
  features_per_stage: [384, 384, 512, 512]
  model_name: hybrid_tokenizer_b16
  # encoder settings
  pretrained_size: 512
  in_channels: 3
  conv_inplane: 64
  drop_path_rate: 0.0
  with_cffn: true
  cffn_ratio: 0.5
  deform_num_heads: 8
  deform_ratio: 0.5
  add_vit_feature: true
  use_extra_extractor: true
  with_cp: true
  extra_extractor: convnext

# Adapter Configuration
adapter:
  latent_width: 32
  n_conv_per_stage: 3
  depth_per_stage: 2
  norm: rmsnorm2dfp32
  act: gelu
  drop: 0.0
  act_first: false
  conv_bias: true
  block_types: ["mbconv", "mbconv", "mbconv", "mbconv"]
  output_process: null # [sigmoid, softmax, None]
  additional_head: depth_scale

num_classes: 1
input_channels: 3
use_latent: false
deep_supervision: false
# Tokenizer pretrained path (needs to be overridden)
tokenizer_pretrained_path: runs/stage1_cosmos_hybrid/2025-12-21_23-52-12_hybrid_cosmos_f16c64_ijepa_pretrained_sem_no_lejepa/ema/tokenizer/model.safetensors
_debug: false
