defaults:
  - tokenizer: hybrid
  - _self_

_target_: src.stage2.segmentation.models.tokenizer_backbone_adapted.TokenizerHybridUNet.create_model
# Tokenizer Feature Configuration
tokenizer_feature:
  pretrained_path: null
  features_per_stage: [512, 512, 512, 512]
  model_name: hybrid_tokenizer_b16
  # encoder settings
  pretrained_size: 512
  in_channels: ${dataset.consts.bands}
  conv_inplane: 64
  drop_path_rate: 0.2
  with_cffn: true
  cffn_ratio: 0.25
  deform_num_heads: 16
  deform_ratio: 0.5
  add_vit_feature: true
  use_extra_extractor: true
  with_cp: true

# Adapter Configuration
adapter:
  adapter_type: default
  latent_width: 64
  n_conv_per_stage: 1
  depth_per_stage: 1
  norm: layernorm2d
  act: gelu
  drop: 0.0
  act_first: false
  conv_bias: false
  block_types: ["nat", "nat", "mbconv", "mbconv"]

num_classes: ${dataset.consts.num_classes}
input_channels: ${dataset.consts.bands}
use_latent: false
# Tokenizer pretrained path (needs to be overridden)
tokenizer_pretrained_path: runs/pretrained_model_ckpts/NaflexHybridTokenizerLayerNorm.safetensors
