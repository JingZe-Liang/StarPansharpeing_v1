hydra:
  output_subdir: null
  run:
    dir: .

defaults:
  - dataset: mat_singles
  - accelerator: base
  - model@segment_model: unet_dpa
  - _self_
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

dataset:
  dataset_name: Indian_pines
  train:
    cfg:
      dataset_kwargs:
        dataset_name: ${dataset.dataset_name}
        full_img: false
        online_slice: true
        samples_per_cls: ${dataset.consts.n_patches}
        patch_size: ${dataset.consts.patch_size}
      dataloader_kwargs:
        batch_size: 16
        num_workers: 2
        shuffle: true
        pin_memory: true

segment_model:
  n_channels: ${dataset.consts.bands}
  n_classes: ${dataset.consts.num_classes}
  bilinear: true

ema:
  _target_: ema_pytorch.EMA
  _partial_: true
  beta: 0.995
  update_after_step: 1000
  update_every: 2
  allow_different_devices: true
  lazy_init_ema: true

metric:
  _target_: src.stage2.segmentation.metrics.basic.HyperSegmentationScore
  n_classes: ${dataset.consts.num_classes}
  ignore_index: 255
  include_bg: false
  input_format: index
  task: multiclass

train:
  val_slide_window: false
  grad_check: false
  act_checkpoint: false
  val_slide_window_kwargs:
    patch_size: ${dataset.consts.patch_size}
    stride: ${dataset.consts.stride}

  use_single_img_indexing: false
  patches_per_image:
  macro_batch_size: 2

  proj_dir: runs/stage2_segmentation_single_image/
  finetune_strategy: finetune_all
  max_grad_norm: 1.0

  track_metrics_duration: -1
  track_metrics_after: 0
  visualize_every: 200
  max_steps: 10_000
  save_every: 500
  is_neg_1_1: true

  resume_path:
  ema_load_path:

  bootstrap_ratio: 0.
  bootstrap_start_step: 0

  segment_optim:
    _target_: heavyball.ForeachAdamW
    _partial_: true
    lr: 3.0e-4
    weight_decay: 0.0
    betas: ${tuple:[0.9, 0.95]}
    caution: true
    foreach: true

  segment_sched:
    _target_: transformers.optimization.get_cosine_schedule_with_warmup
    _partial_: true
    num_warmup_steps: 0
    num_training_steps: ${train.max_steps}
    num_cycles: 1

  segment_loss:
    _target_: src.stage2.segmentation.loss.seg_loss.HyperSegmentationLoss
    mode: multiclass
    num_classes: ${dataset.consts.num_classes}
    ignore_index: 255
    ce_weight: null
    loss_weights: [1.0, 1.0, 0.2, 0.0]
    dynamic_mode: null
    ema_decay: 0.99

  log:
    run_comment: single_hyper_image_indian_pines_unet
    log_with_time: true
    log_every: 10
    log_with: [wandb]
  debug: true

val:
  val_duration: 200
  max_val_iters: -1
