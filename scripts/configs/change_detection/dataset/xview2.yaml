train_bs: 4
val_bs: 4

data_type: null
label_mode: seg
patch_size: 256
micro_batch_size: 8
dataset_name: xView2

consts:
  num_classes: 2
  bands: 3
  unchanged_label: 0
  changed_label: 1

train:
  _target_: src.stage2.change_detection.data.xview2.create_xview2_change_detection_dataloader
  data_root: data/Downstreams/xView2_raw
  split: train
  include_hold_in_train: true
  batch_size: ${dataset.train_bs}
  shuffle: true
  num_workers: 4
  transform: default
  normalize: true
  img_to_neg1_1: true
  resize_to_mask: true
  resize_crop_to: 512
  resize_crop_scale: [0.8, 1.0]
  resize_crop_ratio: [0.75, 1.3333333333333333]
  binarize_gt: true
  return_name: false
  pin_memory: true
  drop_last: false

val:
  _target_: src.stage2.change_detection.data.xview2.create_xview2_change_detection_dataloader
  data_root: data/Downstreams/xView2_raw
  split: test
  include_hold_in_train: false
  batch_size: ${dataset.val_bs}
  shuffle: true
  num_workers: 2
  transform: null
  normalize: true
  img_to_neg1_1: true
  resize_to_mask: true
  resize_crop_to: 512
  resize_crop_scale: [1.0, 1.0]
  resize_crop_ratio: [1.0, 1.0]
  binarize_gt: true
  return_name: false
  pin_memory: true
  drop_last: false
