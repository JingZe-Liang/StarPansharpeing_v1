train_bs: 4
val_bs: 4

data_type: null
label_mode: seg
micro_batch_size: 12
dataset_name: CONCAT_CD_TRAIN_256

consts:
  num_classes: 2
  bands: 3
  unchanged_label: 0
  changed_label: 1

train:
  _target_: src.stage2.change_detection.data.levir_cd.create_concat_cd_train_dataloader
  batch_size: ${dataset.train_bs}
  num_workers: 4
  dataset_names: [levir, s2looking, svcd, jl1]
  output_size: 256
  shuffle: true
  transform: default
  normalize: true
  img_to_neg1_1: true
  label_threshold: 0
  return_name: false
  pin_memory: true
  drop_last: false
  levir_data_root: data/Downstreams/ChangeDetection/LEVIR-CD/LEVIR-CD256
  s2looking_data_root: data/Downstreams/ChangeDetection/S2Looking
  svcd_data_root: data/Downstreams/ChangeDetection/SVCD_subset
  jl1_data_root: data/Downstreams/ChangeDetection/JL1-CD
  levir_split: trainval
  s2looking_split: train
  svcd_split: train
  jl1_split: train
  s2looking_use_random_crop_resize: true
  jl1_use_random_crop_resize: false
  random_crop_resize_scale: [0.5, 1.0]
  random_crop_resize_ratio: [0.75, 1.3333333333333333]
  random_crop_resize_prob: 1.0

val:
  _target_: src.stage2.change_detection.data.levir_cd.create_levir_cd_dataloader
  data_root: data/Downstreams/ChangeDetection/LEVIR-CD/LEVIR-CD256
  split: test
  list_dir: list
  batch_size: ${dataset.val_bs}
  shuffle: false
  num_workers: 2
  transform: null
  normalize: true
  img_to_neg1_1: true
  label_threshold: 0
  resize_to: 256
  random_crop_resize_to: null
  return_name: false
  pin_memory: true
  drop_last: false
