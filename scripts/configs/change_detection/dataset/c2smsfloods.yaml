train_bs: 8
val_bs: 4

data_type: null
label_mode: seg
patch_size: 128
micro_batch_size: 12
dataset_name: C2SMSFloodS1

consts:
  num_classes: 2
  bands: 2
  unchanged_label: 0
  changed_label: 1

train:
  _target_: src.stage2.change_detection.data.c2smsfloods.create_c2smsfloods_change_detection_dataloader
  data_root: data/Downstreams/c2smsfloods
  chips_dir_name: chips
  split: train
  sensor: s1
  train_ratio: 0.7
  val_ratio: 0.15
  batch_size: ${dataset.train_bs}
  shuffle: true
  num_workers: 4
  transform: default
  normalize: true
  normalization_strategy: baseline
  img_to_neg1_1: true
  s1_min_normalize: -77.0
  s1_max_normalize: 26.0
  return_name: false
  pin_memory: true
  drop_last: false

val:
  _target_: src.stage2.change_detection.data.c2smsfloods.create_c2smsfloods_change_detection_dataloader
  data_root: data/Downstreams/c2smsfloods
  chips_dir_name: chips
  split: test
  sensor: s1
  train_ratio: 0.7
  val_ratio: 0.15
  batch_size: ${dataset.val_bs}
  shuffle: false
  num_workers: 2
  transform: null
  normalize: true
  normalization_strategy: baseline
  img_to_neg1_1: true
  s1_min_normalize: -77.0
  s1_max_normalize: 26.0
  return_name: false
  pin_memory: true
  drop_last: false
