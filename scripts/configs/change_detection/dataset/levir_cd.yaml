train_bs: 4
val_bs: 4

data_type: null
label_mode: seg
micro_batch_size: 12
dataset_name: LEVIR_CD256

consts:
  num_classes: 2
  bands: 3
  unchanged_label: 0
  changed_label: 1

train:
  _target_: src.stage2.change_detection.data.levir_cd.create_levir_cd_dataloader
  data_root: data/Downstreams/ChangeDetection/LEVIR-CD/LEVIR-CD256
  split: trainval
  list_dir: list
  batch_size: ${dataset.train_bs}
  shuffle: true
  num_workers: 4
  transform: default
  normalize: true
  img_to_neg1_1: true
  label_threshold: 0
  resize_to: null
  return_name: false
  pin_memory: true
  drop_last: false

val:
  _target_: src.stage2.change_detection.data.levir_cd.create_levir_cd_dataloader
  data_root: data/Downstreams/ChangeDetection/LEVIR-CD/LEVIR-CD256
  split: test
  list_dir: list
  batch_size: ${dataset.val_bs}
  shuffle: true
  num_workers: 2
  transform: null
  normalize: true
  img_to_neg1_1: true
  label_threshold: 0
  resize_to: null
  return_name: false
  pin_memory: true
  drop_last: false
