defaults:
  - tokenizer: hybrid
  - _self_

_target_: src.stage2.change_detection.models.tokenizer_bit_sdpa_cd.TokenizerHybridBITCDModel.create_model

tokenizer_feature:
  pretrained_path: null
  features_per_stage: [384, 384, 512, 512]
  model_name: hybrid_tokenizer_b16
  interaction_indexes: [1, 2, 4, 5]
  pretrained_size: 512
  in_channels: ${dataset.consts.bands}
  conv_inplane: 64
  drop_path_rate: 0.2
  with_cffn: true
  cffn_ratio: 1.0
  deform_num_heads: 16
  deform_ratio: 0.5
  add_vit_feature: true
  use_extra_extractor: true
  with_cp: true
  select_in_all_layers: true
  layer_in_channels: [512, 512, 1152, 1152]
  extractor_type: deform_attention
  extractor_kwargs: {}

adapter:
  latent_width: 32
  norm: rmsnorm2dfp32
  act: gelu
  drop: 0.0
  conv_bias: true

neck:
  stage_index: 2
  raw_embed_channels: 64
  out_channels: 512

bit_head:
  channels: 128
  embed_dims: 256
  enc_depth: 2
  dec_depth: 4
  num_heads: 8
  drop_rate: 0.0
  use_tokenizer: true
  token_len: 4
  pool_size: 2
  pool_mode: max
  upsample_scale: 4

input_channels: ${dataset.consts.bands}
num_classes: ${dataset.consts.num_classes}
freeze_tokenizer: true
_debug: false

tokenizer_pretrained_path: runs/stage1_cosmos_hybrid/2025-12-21_23-52-12_hybrid_cosmos_f16c64_ijepa_pretrained_sem_no_lejepa/ema/tokenizer/model.safetensors
