# Default configuration for TokenizerHybridUNet model
# This configuration is extracted from the _create_default_cfg() function in tokenizer_backbone_adapted.py

defaults:
  - tokenizer: hybrid
  - _self_

# CNN Model Configuration
# in defaults

_target_: src.stage2.change_detection.models.tokenizer_backbone_adapted.TokenizerHybridUNet.create_model

# Tokenizer Feature Configuration
tokenizer_feature:
  pretrained_path: null
  features_per_stage: [384, 384, 512, 512]
  model_name: hybrid_tokenizer_b16
  interaction_indexes: [1, 2, 4, 5]
  # encoder settings
  pretrained_size: 512
  in_channels: ${dataset.consts.bands}
  conv_inplane: 64
  drop_path_rate: 0.2
  with_cffn: true
  cffn_ratio: 1.0
  deform_num_heads: 16
  deform_ratio: 0.5
  add_vit_feature: true
  use_extra_extractor: true
  with_cp: true

# Adapter Configuration
adapter:
  adapter_type: default
  latent_width: 32
  n_conv_per_stage: 1
  depth_per_stage: 1
  norm: rmsnorm2dfp32
  act: gelu
  drop: 0.0
  act_first: false
  conv_bias: true
  block_types: ["mbconv", "mbconv", "mbconv", "mbconv"]

# Change Detection Stage Configuration
cd_stage:
  channels: [384, 384, 512, 512]
  stride: 1
  kernel_size: 3
  norm_layer: rmsnorm2dfp32
  act_layer: gelu
  expand_ratio: 2.0
  block_type: mbconv
  depth: 2
  fuse_mode: cat_abs

# UNet Configuration
input_channels: ${dataset.consts.bands}
num_classes: ${dataset.consts.num_classes}
deep_supervision: false
n_stages: 4
use_latent: true
ensure_rgb_type: null
_debug: false

# Tokenizer pretrained path (needs to be overridden)
tokenizer_pretrained_path: runs/stage1_cosmos_hybrid/2025-12-21_23-52-12_hybrid_cosmos_f16c64_ijepa_pretrained_sem_no_lejepa/ema/tokenizer/model.safetensors
