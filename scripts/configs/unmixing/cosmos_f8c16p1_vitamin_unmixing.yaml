hydra:
  output_subdir: null
  run:
    dir: .

defaults:
  # wrapper ==========
  - dataset: unmixing_collection
  - accelerator: base
  - unmixing_model: vitamin
  # self ===============
  - _self_

  # hydra overrides ====
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

dataset:
  cfgs:
    used: DC
    batch_size_train: 16

ema:
  _target_: ema_pytorch.EMA
  _partial_: true
  beta: 0.999
  update_after_step: 1000
  update_every: 2
  allow_different_devices: true

train:
  grad_check: false
  proj_dir: runs/stage2_unmixing/
  max_grad_norm: 0.03
  set_grad_checkpoint: false

  track_metrics_duration: -1
  track_metrics_after: 1000
  visualize_every: 500
  max_steps: 400_000
  save_every: 1000

  to_neg_1_1: false
  online_tokenize: true
  init_endmembers: true

  resume_path:
  ema_load_path: #runs/stage2_pansharpening_wrapper/2025-09-25_19-16-29_f8c16p1_WV3_nafnet_wrapper/ema

  unmixing_loss:
    _target_: src.stage2.unmixing.loss.basic.UnmixingLoss
    weights: ${list:[1.0, 0.35, 0.1]}

  unmixing_optim:
    # _target_: torch.optim.AdamW
    # _partial_: true
    # lr: 1.0e-3
    # weight_decay: 1.0e-4
    # eps: 1e-10
    # betas: ${tuple:[0.9, 0.999]} #[0.5, 0.9], gan training beta1 is zero

    _target_: heavyball.ForeachAdamW
    _partial_: true
    lr: 1.0e-3
    weight_decay: 1.0e-4
    eps: 1e-9
    betas: ${tuple:[0.95, 0.99]} #[0.5, 0.9], gan training beta1 is zero
    caution: true
    foreach: true

    # _target_: heavyball.ForeachSOAP
    # _partial_: true
    # lr: 1.0e-3
    # eps: 1e-10
    # betas: ${tuple:[0.9, 0.99]}
    # weight_decay: 0.

  unmixing_sched:
    _target_: transformers.optimization.get_cosine_schedule_with_warmup
    _partial_: true
    num_warmup_steps: 100
    num_training_steps: ${train.max_steps}
    num_cycles: 3

  log:
    run_comment: f8c16p1_${dataset.cfgs.used}_unmixing_vitamin
    log_with_time: True
    log_every: 10

  debug: true

val:
  val_duration: 1000
  max_val_reduced_iters: -1 # val only `max_val_iters` batches
  max_val_full_iters: 20
  val_use_patches: true
  crop_batch_size: 64
  window_size: 128
  stride: 64
