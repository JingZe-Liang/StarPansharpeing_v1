_target_: src.stage2.layers.wrapper.tokenizer_wrapper.DownstreamModelTokenizerWrapper

# Tokenizer configuration (from cosmos_f8c16p1_lora.yaml)
tokenizer:
  _target_: src.stage1.cosmos.lora_mixin.TokenizerLoRAMixin
  tokenizer:
    _target_: src.stage1.cosmos.cosmos_tokenizer.ContinuousImageTokenizer.create_model
    model:
      attn_resolutions: [32]
      channels: 128
      channels_mult: [2, 4, 4]
      dropout: 0.0
      in_channels: ${list:[3, 4, 8, 10, 12, 13, 32, 50, 150, 175, 202, 224, 242, 368, 369]}
      spatial_compression: 8
      num_res_blocks: 2
      out_channels: ${list:[3, 4, 8, 10, 12, 13, 32, 50, 150, 175, 202, 224, 242, 368, 369]}
      resolution: 1024
      z_channels: 16
      act_checkpoint: false
      latent_channels: 16
      norm_type: gn
      norm_groups: 32
      block_name: res_block
      moe_token_mixer_type: res_block
      hidden_factor: 4
      use_residual_factor: false
      # others
      patch_method: haar
      patch_size: 1
      attn_type: none
      padding_mode: reflect # for boundary?
    # repa
    use_repa_loss: false
    use_vf_loss: false
    hook_module: decoder.decoder.mid.block_2
    vf_on_z_or_module: z # [z, module]
    dino_feature_dim: 1024
    # loading
    enc_path: ""
    dec_path: ""
    uni_path: runs/stage1_cosmos/2025-09-13_17-16-19_cosmos_f8c16p1_unified_hyperspectral_latent_noise=0.0_channel_drop=False/ema/tokenizer/model.safetensors
    loading_type: pretrained
    # quant
    norm_in_quant_conv: false
  lora_weights:
    DC: runs/stage1_cosmos_lora/2025-09-29_13-31-29_cosmos_lora=lora_r=32_f8c16p1_DC/peft_ckpt/DC/adapter_model.safetensors
    Jasper: runs/stage1_cosmos_lora/2025-09-29_13-35-50_cosmos_lora=lora_r=32_f8c16p1_Jasper/peft_ckpt/Jasper/adapter_model.safetensors
  lora_hyper_chans:
    DC: 191
    Jasper: 198
  active_lora: ${dataset.cfgs.used}

# Pansharpening model configuration (from nafnet.yaml)
downstream_model:
  _target_: src.stage2.unmixing.models.model.LatentUnmixingModel
  _partial_: true # for decode_fn

  # detokenizer ... partial
  # endmember_init_value is partial

  # Model configuration
  amotized_model:
    _target_: src.stage2.unmixing.models.transformer.Transformer.create_model
    in_dim: 16
    out_channels: 256
    dim: 512
    num_heads: 8
    mlp_ratio: 3.0
    patch_size: 1 # if not slide window

  pixel_model:
    _target_: src.stage2.unmixing.models.resnet.UnmixingResNet.create_model
    in_channels: ${dataset.consts.bands}
    out_channels: ${dataset.consts.n_endmembers}
    cond_channels: 256
    depths: [2, 2, 2]
    channels: [256, 512, 512]
    residual_of_init_abunds: false
    abunds_restriction: softmax

  end_member_model:
    _target_: src.stage2.unmixing.models.to_endmember.ToEndMemberParameter
    apply_relu: true
    num_endmember: ${dataset.consts.n_endmembers}
    channels: ${dataset.consts.bands}
    init_value: null # left for trainer to initialize

    # _target_: src.stage2.unmixing.models.to_endmember.ToEndMemberMutliLinear
    # apply_relu: true
    # num_endmember: ${dataset.consts.n_endmembers}
    # channels: ${dataset.consts.bands}
    # n_layers: 5
    # init_value: null # left for trainer to initialize

    # _target_: src.stage2.unmixing.models.to_endmember.ToEndMemberConv
    # apply_relu: true
    # num_endmember: ${dataset.consts.n_endmembers}
    # channels: ${dataset.consts.bands}
    # init_value: null # left for trainer to initialize

  amotize_type: latent_to_pixel_fusion
  learn_decoder: false
  backward_decoder: false

# Wrapper configuration
froze_tokenizer: true
n_img_encoded: 1 # For pansharpening, we have 3 images: LRMS, PAN, and HRMS
tokenizer_scale_shift: [6.25221633, 0.0] # std, mean from cosmos_f8c16p1_lora.yaml
img_is_neg_1_1: false
