[build-system]
requires = ["setuptools>=42"]
build-backend = "setuptools.build_meta"

[project]
name = "RS_tokenizer"
version = "0.1.0"
requires-python = ">=3.10, <3.13"
dependencies = [
    "numpy>=1.21.0",
    "torch>=2.6.0",
    "transformers>=4.30.0",
    "timm>=0.9.6",
    "accelerate",
    "torchvision",
    "matplotlib",
    "loguru",
    "typer",
    "omegaconf",
    "bitsandbytes",
    "heavyball",
    "fvcore",
]

[project.optional-dependencies]
dev = ["pytest>=6.0", "ruff>=0.11"]


[project.scripts]
wids-index = "data.wids_index:main"


[tool.setuptools.packages.find]
where = ["src"]
